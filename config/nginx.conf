# ─────────────────────────────────────────────────────────────────
# BrainBerry – Nginx Configuration
# Optimized for static site serving with proper MIME types,
# compression, caching, and security headers.
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # ── MIME Type Fixes ───────────────────────────────────────────
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js;
        application/json                      json;
        application/manifest+json             webmanifest;

        # Media
        video/mp4                             mp4;
        video/webm                            webm;
        video/quicktime                       mov;
        assets/audio/mpeg                            mp3;
        assets/audio/ogg                             ogg;
        assets/audio/wav                             wav;

        # Images
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        image/svg+xml                         svg;
        image/webp                            webp;
        image/x-icon                          ico;

        # Fonts
        font/woff                             woff;
        font/woff2                            woff2;
        font/ttf                              ttf;
        application/vnd.ms-fontobject         eot;

        # ML Models (served as binary)
        application/octet-stream              shard1 shard2;
    }

    # ── Static Asset Caching ─────────────────────────────────────
    # Long cache for media/images (these rarely change)
    location ~* \.(mp4|mov|webm|mp3|ogg|wav|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Short cache for CSS/JS (may change between deploys)
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── ML Model Files ───────────────────────────────────────────
    location /assets/models/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Main Location ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Error Pages ──────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ── Deny Hidden Files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
