<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

 <title>Hindi | BrainBerry</title>
 <style>
 body {
 margin: 0;
 font-family: "Fugaz One", sans-serif;
 background: #f6f6f9;
 }

 /* Cinematic Background Video */
 .bg-video {
 position: fixed;
 top: 0;
 left: 0;
 width: 100vw;
 height: 100vh;
 object-fit: cover;
 z-index: -2;
 animation: slowZoom 25s ease-in-out infinite alternate;
 }
 @keyframes slowZoom {
   0% { transform: scale(1); }
   100% { transform: scale(1.08); }
 }

 /* Vignette & Ambient Light Overlay */
 .vignette-overlay {
 position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
 background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.65) 100%);
 }
 .flicker-overlay {
 position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;
 background: rgba(255, 180, 50, 0.03);
 animation: templeFlicker 4s infinite alternate;
 }
 @keyframes templeFlicker {
  0% { opacity: 0.8; }
  50% { opacity: 1; }
  100% { opacity: 0.85; }
 }

 /* Navbar */
 .navbar {
 background: rgba(75, 42, 173, 0.9);
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: 8px 20px;
 color: #fff;
 position: relative;
 z-index: 10;
 }

 /* Logo */
 .navbar .logo {
 display: flex;
 align-items: center;
 gap: 8px;
 }
 .navbar .logo img {
 width: 80px;
 height: 55px;
 border-radius: 6px;
 }
 .navbar .logo span {
 font-size: 1.2rem;
 font-weight: bold;
 }

 /* Menu */
 .navbar .menu {
 display: flex;
 gap: 25px;
 position: relative;
 }
 .navbar .menu a {
 text-decoration: none;
 color: #fff;
 font-weight: 500;
 font-size: 0.95rem;
 padding: 5px 8px;
 position: relative;
 transition: all 0.3s ease;
 }

 .navbar .menu a:hover {
 color: #ffcc00;
 background: rgba(255, 255, 255, 0.15);
 border-radius: 6px;
 filter: none !important;
 }

 /* Blur other options */
 .navbar .menu:hover a:not(:hover) {
 filter: blur(2px) brightness(70%);
 }

 /* Right side */
 .navbar .right {
 display: flex;
 align-items: center;
 gap: 15px;
 }
 .reward {
 display: flex;
 align-items: center;
 gap: 5px;
 font-size: 0.9rem;
 }
 .reward img {
 width: 20px;
 height: 20px;
 }
 .profile img {
 width: 70px;
 height: 55px;
 border-radius: 50%;
 border: 0px solid #fff;
 }

 /* Video preview */
 .video-preview {
 position: absolute;
 top: 40px;
 left: 0;
 width: 200px;
 height: 120px;
 border-radius: 8px;
 overflow: hidden;
 box-shadow: 0 4px 10px rgba(0,0,0,0.3);
 opacity: 0;
 pointer-events: none;
 transition: opacity 0.3s ease;
 background: #000;
 z-index: 20;
 }
 .video-preview video {
 width: 100%;
 height: 100%;
 object-fit: cover;
 }
 .navbar .menu a:hover .video-preview {
 opacity: 1;
 }

 /* Storytelling Hub lockup */
 .story-hub {
 position: absolute;
 top: 20%;
 left: 50%;
 transform: translateX(-50%);
 text-align: center;
 z-index: 5;
 width: 90%;
 animation: slideDownFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
 }
 @keyframes slideDownFade {
  0% { opacity: 0; transform: translate(-50%, -20px); }
  100% { opacity: 1; transform: translate(-50%, 0); }
 }
 .game-level {
 display: inline-block;
 background: rgba(255, 255, 255, 0.15);
 border: 1px solid rgba(255, 255, 255, 0.3);
 backdrop-filter: blur(10px);
 padding: 6px 16px;
 border-radius: 30px;
 color: #FFD700;
 font-family: sans-serif;
 font-size: 0.85rem;
 font-weight: 700;
 letter-spacing: 1px;
 text-transform: uppercase;
 margin-bottom: 12px;
 box-shadow: 0 4px 15px rgba(0,0,0,0.3);
 }
 .page-title {
 color: #fff;
 font-size: clamp(1.8rem, 4vw, 2.8rem);
 text-shadow: 0 4px 15px rgba(0,0,0,0.8);
 letter-spacing: 1px;
 margin: 0;
 line-height: 1.2;
 }
 .page-subtitle {
 color: rgba(255,255,255,0.85);
 font-family: sans-serif;
 font-size: clamp(1rem, 2vw, 1.2rem);
 font-weight: 500;
 margin-top: 8px;
 text-shadow: 0 2px 8px rgba(0,0,0,0.5);
 }

 /* Interactive Portals */
 .center-boxes {
 position: absolute;
 top: 55%;
 left: 50%;
 transform: translate(-50%, -50%);
 display: flex;
 gap: 40px;
 z-index: 5;
 animation: popIn 0.8s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
 }
 @keyframes popIn {
  0% { opacity: 0; transform: translate(-50%, -30%); scale: 0.85; }
  100% { opacity: 1; transform: translate(-50%, -50%); scale: 1; }
 }

 /* Premium Glass Panels (Jony Ive approach) */
 .center-boxes .box {
 width: 220px;
 height: 250px;
 background: linear-gradient(145deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
 border-radius: 28px;
 backdrop-filter: blur(12px);
 -webkit-backdrop-filter: blur(12px);
 display: flex;
 flex-direction: column;
 justify-content: center;
 align-items: center;
 font-size: 1.6rem;
 font-weight: 600;
 color: #fff;
 text-decoration: none;
 cursor: pointer;
 transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
 box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.4);
 border: 1px solid rgba(255,255,255,0.3);
 gap: 16px;
 position: relative;
 overflow: hidden;
 }

 /* Micro-interactions (Emil Kowalski approach) */
 .center-boxes .box:hover {
 transform: translateY(-12px) scale(1.05);
 box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.6);
 }
 .center-boxes .box:active {
 transform: translateY(2px) scale(0.98);
 transition: transform 0.1s;
 }

 /* Theme Glows for Hindi */
 .box.swar-card {
 border-top: 1px solid rgba(255, 200, 100, 0.8);
 border-left: 1px solid rgba(255, 200, 100, 0.5);
 }
 .box.swar-card:hover {
 background: linear-gradient(145deg, rgba(255, 180, 50, 0.3) 0%, rgba(255,255,255,0.05) 100%);
 border-color: rgba(255, 200, 100, 0.9);
 box-shadow: 0 20px 40px rgba(255, 180, 50, 0.35), inset 0 1px 1px rgba(255,255,255,0.6);
 }
 
 .box.vyanjan-card {
 border-top: 1px solid rgba(100, 200, 255, 0.8);
 border-left: 1px solid rgba(100, 200, 255, 0.5);
 }
 .box.vyanjan-card:hover {
 background: linear-gradient(145deg, rgba(50, 150, 255, 0.3) 0%, rgba(255,255,255,0.05) 100%);
 border-color: rgba(100, 200, 255, 0.9);
 box-shadow: 0 20px 40px rgba(50, 150, 255, 0.35), inset 0 1px 1px rgba(255,255,255,0.6);
 }

 /* Icon inside box */
 .center-boxes .box .box-icon {
 font-size: 4rem;
 line-height: 1;
 filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
 transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
 }
 .center-boxes .box:hover .box-icon {
 transform: scale(1.15) translateY(-5px);
 }
</style>

<script>
 /* ── Hindi lesson access guard ── */
 (function() {
  function checkAccess() {
   if (!window.BB_UserData) return;
   var raw = window.BB_UserData.getItem('bb_assigned_lessons');
   if (!raw) return;
   var assigned = [];
   try { assigned = JSON.parse(raw); } catch(e) { return; }
   /* Migration: if hindi missing from old save, unlock it */
   if (assigned.indexOf('hindi') === -1) {
    assigned.push('hindi');
    window.BB_UserData.setItem('bb_assigned_lessons', JSON.stringify(assigned));
   }
  }
  if (document.readyState === 'loading') {
   document.addEventListener('DOMContentLoaded', checkAccess);
  } else { checkAccess(); }
 })();
</script>
