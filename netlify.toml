# ─────────────────────────────────────────────────────────────────
# BrainBerry – Netlify Deployment Configuration
# ─────────────────────────────────────────────────────────────────

[build]
  # Publish from the root directory (static site, no build step)
  publish = "."

# ── Headers ──────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "*.mp3"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── Redirects ────────────────────────────────────────────────────
# SPA fallback (catch-all for deep links)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

