<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
 <title>Animals | BrainBerry</title>
 <style>
 body {
 margin: 0;
 font-family: "Fugaz One", sans-serif;
 background: #f6f6f9;
 }

 /* Background video */
 .bg-video {
 position: fixed; top: 0; left: 0;
 width: 100%; height: 100%;
 object-fit: cover; z-index: -1;
 }

 /* Navbar */
 .navbar {
 background: rgba(75, 42, 173, 0.9);
 backdrop-filter: blur(10px);
 display: flex; align-items: center;
 justify-content: space-between;
 padding: 8px 20px; color: #fff;
 position: relative; z-index: 100;
 }
 .navbar .logo { display: flex; align-items: center; gap: 8px; }
 .navbar .logo img { width: 80px; height: 55px; border-radius: 6px; }
 .navbar .logo span { font-size: 1.2rem; font-weight: bold; }
 .navbar .menu { display: flex; gap: 25px; position: relative; }
 .navbar .menu a {
 text-decoration: none; color: #fff; font-weight: 500;
 font-size: 0.95rem; padding: 5px 8px; position: relative;
 transition: all 0.3s ease;
 }
 .navbar .menu a:hover {
 color: #ffcc00; background: rgba(255,255,255,0.15);
 border-radius: 6px; filter: none !important;
 }
 .navbar .menu:hover a:not(:hover) { filter: blur(2px) brightness(70%); }
 .navbar .right { display: flex; align-items: center; gap: 15px; }
 .reward { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
 .reward img { width: 20px; height: 20px; }
 .profile img { width: 70px; height: 55px; border-radius: 50%; border: 0px solid #fff; }

 /* Video preview */
 .video-preview {
 position: absolute; top: 40px; left: 0;
 width: 200px; height: 120px; border-radius: 8px;
 overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
 opacity: 0; pointer-events: none;
 transition: opacity 0.3s ease; background: #000; z-index: 20;
 }
 .video-preview video { width: 100%; height: 100%; object-fit: cover; }
 .navbar .menu a:hover .video-preview { opacity: 1; }


 /* ─── ANIMALS WRAPPER (Depth System) ─── */
 .phonics-wrapper {
 margin: 12px auto;
 max-width: calc(100% - 40px);
 min-height: 450px;
 background: rgba(255,255,255,0.12);
 backdrop-filter: blur(20px);
 -webkit-backdrop-filter: blur(20px);
 border-radius: 20px;
 border: 1px solid rgba(255,255,255,0.3);
 box-shadow: 0 20px 60px rgba(0,0,0,0.3); /* Enhanced Shadow */
 padding: 18px 20px;
 position: relative;
 z-index: 5;
 color: #111;
 overflow: hidden; /* For swipe animations */
 }

 .section-title {
 font-size: 1.5rem; font-weight: 800;
 color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.5);
 margin-bottom: 6px; letter-spacing: 1px;
 display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
 }
 .back-link {
 font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.7);
 cursor: pointer; text-decoration: underline; transition: color 0.2s;
 }
 .back-link:hover { color: #ffcc00; }

 /* Contextual AI Hint */
 .ai-hint {
 font-size: 1.15rem; color: #ffcc00; font-weight: 700;
 margin: 5px 0 10px 0; min-height: 28px; transition: opacity 0.3s ease;
 text-align: center; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
 }

 /* ─── Sound panel (centered stack) ─── */
 .sound-panel {
 display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: flex-start;
 width: 100%; max-width: 650px; margin: 0 auto;
 }

 /* ─── Center animal card (Living System) ─── */
 .letter-card {
 width: 100%; box-sizing: border-box;
 background: rgba(255,255,255,0.38);
 border-radius: 20px; padding: 16px 16px;
 display: flex; flex-direction: column;
 align-items: center; gap: 8px;
 text-align: center;
 transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
 }

 /* Idle Float Animation */
 @keyframes living-idle {
 0%, 100% { transform: translateY(0); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
 50% { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.25); }
 }
 .living-card {
 animation: living-idle 4s ease-in-out infinite; 
 }

 /* State Animations */
 .card-vibrate { /* Audio Sync */
 animation: card-vibrate-anim 0.2s linear infinite;
 box-shadow: 0 0 40px rgba(91,108,249,0.7);
 background: rgba(91,108,249,0.15);
 }
 @keyframes card-vibrate-anim {
 0% { transform: translate(1px, 1px) rotate(0deg); }
 25% { transform: translate(-1px, 1px) rotate(-1deg); }
 50% { transform: translate(-1px, -1px) rotate(0deg); }
 75% { transform: translate(1px, -1px) rotate(1deg); }
 100% { transform: translate(1px, 1px) rotate(0deg); }
 }
 .card-thinking { /* Pulse Pause */
 animation: pulse-think 1.5s infinite;
 }
 @keyframes pulse-think {
 0%, 100% { transform: scale(1); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
 50% { transform: scale(1.02); box-shadow: 0 0 25px rgba(255, 204, 0, 0.6); background: rgba(255, 204, 0, 0.1); }
 }
 .card-speaking {
 transform: scale(1.05); box-shadow: 0 0 35px rgba(232,68,90,0.6);
 background: rgba(232,68,90,0.1);
 }
 .card-success {
 box-shadow: 0 0 40px rgba(55,163,74,0.8);
 background: rgba(55,163,74,0.2); transform: scale(1.03);
 }

 /* Hint System Elements */
 .hint-btn {
 background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.6);
 color: #111; padding: 6px 12px; border-radius: 12px; font-size: 0.85rem;
 cursor: pointer; transition: 0.2s; font-family: sans-serif; font-weight: bold;
 }
 .hint-btn:hover { background: rgba(255,255,255,0.6); }
 .word-blur { filter: blur(6px); transition: filter 0.3s; user-select: none; }
 .word-hinted { letter-spacing: 5px; color: #ff8c00; font-family: monospace; }


 /* Animal emoji display */
 .animal-emoji {
 font-size: 90px;
 line-height: 1;
 filter: drop-shadow(0 4px 14px rgba(0,0,0,0.18));
 animation: animal-bounce 2.2s ease-in-out infinite;
 }
 @keyframes animal-bounce {
 0%, 100% { transform: translateY(0) scale(1); }
 50%       { transform: translateY(-10px) scale(1.05); }
 }
 .animal-video-wrapper {
 width: 100%; max-width: 480px; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden;
 box-shadow: 0 10px 25px rgba(0,0,0,0.4), inset 0 0 0 3px rgba(255,255,255,0.2); 
 margin-bottom: 4px; margin-top: 0px;
 position: relative; background: #000; display: none;
 }
 .animal-video-wrapper video {
 width: 100%; height: 100%; object-fit: cover;
 }

 /* Animal name & phrase */
 .phonics-say {
 font-size: 1.8rem; font-weight: 800; color: #2b2b2b;
 letter-spacing: 2px; transition: all 0.3s; text-transform: uppercase;
 margin-bottom: -4px;
 }
 .phonics-phrase {
 font-size: 1rem; font-weight: 700; color: #5b6cf9;
 background: rgba(91,108,249,0.12);
 border-radius: 8px; padding: 6px 14px;
 margin-top: 4px; transition: all 0.3s;
 }

 /* ─── Bottom controls ─── */
 .sound-controls {
 width: 100%; display: flex; flex-direction: column;
 gap: 8px; position: relative;
 }
 
 /* Skill Mastery Bar */
 .skill-bar-wrapper { width: 100%; margin-bottom: 5px; }
 .skill-bar-text { font-size: 1.05rem; font-weight: 800; color: #fff; margin-bottom: 8px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
 .skill-bar-container {
 width: 100%; height: 16px; background: rgba(255,255,255,0.25);
 border-radius: 8px; overflow: hidden; position: relative;
 box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
 }
 .skill-bar-fill {
 height: 100%; width: 0%; border-radius: 8px; background: #e8445a; 
 transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.8s ease;
 box-shadow: 0 0 10px rgba(255,255,255,0.4);
 }

 /* Buttons */
 .ph-btn {
 padding: 12px 18px;
 font-size: 1rem; font-family: "Fugaz One", sans-serif;
 border-radius: 10px; border: none; cursor: pointer;
 transition: all 0.22s ease;
 box-shadow: 0 4px 10px rgba(0,0,0,0.2);
 font-weight: 700; display: inline-flex;
 align-items: center; gap: 8px;
 }
 .ph-btn:hover { transform: translateY(-2px) scale(1.02); filter: brightness(1.1); box-shadow: 0 8px 15px rgba(0,0,0,0.3);}
 .ph-btn:active { transform: translateY(0) scale(0.95); }
 .ph-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }
 .btn-sound { background: #5b6cf9; color: #fff; }
 .btn-speak { background: #e8445a; color: #fff; position: relative; z-index: 2; overflow: visible; }
 .btn-next  { background: #37a34a; color: #fff; }
 .btn-back  { background: rgba(255,255,255,0.35); color: #222; border: 1px solid rgba(255,255,255,0.5); }

 /* Voice UI Ring */
 .voice-ui-ring {
 position: absolute; width: 100%; height: 100%; top: 0; left: 0;
 border-radius: 10px; opacity: 0; pointer-events: none;
 border: 3px solid rgba(232,68,90,0.8);
 box-sizing: border-box;
 }
 .btn-speak.listening .voice-ui-ring {
 animation: voice-ring-expand 1.2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
 border-radius: 20px;
 }
 .btn-speak.listening .voice-ui-ring:nth-child(2) {
 animation-delay: 0.6s;
 }
 @keyframes voice-ring-expand {
 0% { transform: scale(1); opacity: 1; border-width: 4px; }
 100% { transform: scale(1.5) translateY(-5%); opacity: 0; border-width: 0px; }
 }

 .feedback-box {
 min-height: 42px; font-size: 1.05rem; font-weight: 700;
 padding: 10px 14px; border-radius: 10px;
 background: rgba(255,255,255,0.25);
 color: #111; text-align: center;
 transition: background 0.3s;
 }
 .feedback-box.correct { background: rgba(55,163,74,0.4); color: #0a3d0a; }
 .feedback-box.wrong   { background: rgba(232,68,90,0.3); color: #5a0012; }

 .module-nav {
 display: flex; align-items: center; gap: 12px;
 margin-bottom: 2px; flex-wrap: wrap; justify-content: space-between;
 }
 .step-indicator {
 font-size: 0.82rem; font-family: sans-serif;
 color: rgba(255,255,255,0.8); font-weight:bold;
 }
 .btn-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 2px; justify-content: center; }
 .btn-row-nav { display: flex; justify-content: space-between; gap: 16px; margin-top: 2px; }

 /* Swipe Transitions */
 .swipe-in { animation: swipe-in-anim 0.4s forwards ease-out; }
 @keyframes swipe-in-anim {
 0% { transform: translateX(30px) scale(0.98); opacity: 0; }
 100% { transform: translateX(0) scale(1); opacity: 1; }
 }

 /* Shake animation for wrong answers */
 @keyframes shake {
 0%,100% { transform: translateX(0); }
 25% { transform: translateX(-5px) rotate(-1deg); }
 75% { transform: translateX(5px) rotate(1deg); }
 }
 .shake { animation: shake 0.3s ease both; }

 /* ─── Confetti overlay ─── */
 #confetti-overlay {
 position: fixed; inset: 0; pointer-events: none;
 z-index: 9999; overflow: hidden; display: none;
 }
 #confetti-overlay.show { display: block; }
 .confetti-piece {
 position: absolute; width: 10px; height: 14px;
 opacity: 0.95; border-radius: 2px; transform-origin: center;
 animation: confetti-fall 1400ms linear forwards;
 }
 @keyframes confetti-fall {
 0%   { transform: translateY(-5vh) rotate(0deg) scale(1); opacity: 1; }
 100% { transform: translateY(105vh) rotate(720deg) scale(0.8); opacity: 0; }
 }

 /* ─── Red glow error overlay ─── */
 #error-overlay {
 position: fixed; inset: 0; pointer-events: none; z-index: 9998;
 background: rgba(220,30,30,0.0);
 transition: background 0.18s ease;
 }
 #error-overlay.flash { background: rgba(220,30,30,0.38); }

 /* ─── GRAND CELEBRATION overlay ─── */
 #grand-win {
  display: none;
  position: fixed; inset: 0; z-index: 99999;
  background: linear-gradient(135deg,#0e0626 0%,#2d1b69 50%,#0e0626 100%);
  background-size: 300% 300%;
  animation: grad-shift 3s ease infinite;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  text-align: center;
  overflow: hidden;
 }
 #grand-win.show { display: flex; }
 @keyframes grad-shift {
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
 }
 .gw-star {
  position: absolute; font-size: 1.4rem; animation: gw-float linear infinite; opacity: 0; pointer-events: none;
 }
 @keyframes gw-float {
  0%   { transform: translateY(110vh) rotate(0deg); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:1; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity:0; }
 }
 #gw-trophy {
  font-size: 5.5rem;
  animation: gw-trophy-pop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards, gw-trophy-float 2.2s ease-in-out 0.7s infinite;
  line-height: 1; filter: drop-shadow(0 0 30px gold);
 }
 @keyframes gw-trophy-pop {
  0%   { transform: scale(0) rotate(-15deg); opacity:0; }
  100% { transform: scale(1) rotate(0deg); opacity:1; }
 }
 @keyframes gw-trophy-float {
  0%,100% { transform: translateY(0) scale(1); }
  50%     { transform: translateY(-14px) scale(1.06); }
 }
 #gw-title {
  font-family: "Fugaz One", sans-serif; font-size: clamp(2rem, 6vw, 3.6rem);
  background: linear-gradient(90deg,#ffd700,#ff8c00,#ffd700);
  background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: gw-shimmer 2s linear infinite, gw-pop 0.6s 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  margin: 18px 0 8px; letter-spacing: 2px;
 }
 @keyframes gw-shimmer { 0%{background-position:0%} 100%{background-position:200%} }
 @keyframes gw-pop {
  0%   { transform:scale(0.4); opacity:0; }
  100% { transform:scale(1); opacity:1; }
 }
 #gw-sub {
  font-family: "Fugaz One", sans-serif; font-size: clamp(1rem, 3vw, 1.5rem);
  color: #e9d5ff; margin: 0 0 6px; animation: gw-pop 0.6s 0.7s both;
 }
 #gw-unlock {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg,rgba(124,58,237,0.55),rgba(75,42,173,0.55));
  border: 2px solid rgba(167,139,250,0.7); border-radius: 50px;
  padding: 12px 28px; font-family: sans-serif; font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  color: #f3e8ff; font-weight: 700; margin: 14px auto;
  animation: gw-pop 0.6s 0.9s both; box-shadow: 0 0 30px rgba(167,139,250,0.45);
 }
 #gw-btn {
  margin-top: 24px; padding: 16px 44px;
  background: linear-gradient(135deg,#ffd700,#ff8c00);
  border: none; border-radius: 50px; font-family: "Fugaz One", sans-serif;
  font-size: 1.15rem; color: #1a0a00; cursor: pointer;
  box-shadow: 0 6px 28px rgba(255,200,0,0.55);
  transition: transform 0.15s, box-shadow 0.15s;
  animation: gw-pop 0.6s 1.1s both;
 }
 #gw-btn:hover { transform: scale(1.07); box-shadow: 0 10px 36px rgba(255,200,0,0.75); }
 </style>
</head>

 { name: 'Sheep', video: 'assets/videos/Sheep_bleating__baa__202604150055.mp4', emoji: '🐑', sound: 'Baa', phrase: 'Sheep says Baa', alts: ['sheep','shep','shee','ship','sheap','sheeep'] },
 { name: 'Monkey', video: 'assets/videos/Monkey_making_sound_202604150055.mp4', emoji: '🐒', sound: 'Oo Oo Ah Ah', phrase: 'Monkey says Oo Oo', alts: ['monkey','monky','munkey','munky','monke','mokey'] },
 { name: 'Tiger', video: 'assets/videos/Tiger_cub_growling_202604150108.mp4', emoji: '🐯', sound: 'Growl', phrase: 'Tiger says Growl', alts: ['tiger','tigr','tger','tigger','tyger','tigar'] },
];

/* ── UI STATES ── */
const UX_STATES = {
 INTRO: 'INTRO', LISTENING: 'LISTENING', THINKING: 'THINKING', SPEAKING_READY: 'SPEAKING_READY', SPEAKING: 'SPEAKING', FEEDBACK: 'FEEDBACK'
};
let uiState = UX_STATES.INTRO;

/* ── State & Progress ── */
let currentIdx = 0;
let score = 0;
let done = new Array(10).fill(false);
let recognitionActive = false;
let audioPlayed = false;

const PROGRESS_KEY = 'bb_animals_progress';
function _ud() { return window.BB_UserData || { getItem: k => localStorage.getItem(k), setItem: (k,v) => localStorage.setItem(k,v) }; }

function loadProgress() {
 try {
  const saved = JSON.parse(_ud().getItem(PROGRESS_KEY) || 'null');
  if (saved && Array.isArray(saved.done) && saved.done.length === 10) return saved;
 } catch(e) {}
 return null;
}
function saveProgress() {
 _ud().setItem(PROGRESS_KEY, JSON.stringify({ done, score }));
}
(function() {
 const saved = loadProgress();
 if (saved) { done = saved.done; score = saved.score || 0; }
})();

/* ── State Machine Handler ── */
function setUIState(newState) {
 uiState = newState;
 const hintEl = document.getElementById('aiHint');
 const cardEl = document.getElementById('animalCard');
 const speakBtn = document.getElementById('speakBtn');
 const hearBtn = document.getElementById('hearBtn');

 // Reset classes
 cardEl.className = 'letter-card living-card';

 switch(newState) {
  case UX_STATES.INTRO:
   hintEl.textContent = "👋 Let's meet a new animal! Press 🔊 to hear it.";
   speakBtn.disabled = true;
   break;
  case UX_STATES.LISTENING:
   hintEl.textContent = "👂 Listen closely to the sound...";
   cardEl.classList.add('card-vibrate'); // audio sync animation
   break;
  case UX_STATES.THINKING:
   hintEl.textContent = "🤔 What animal could this be?";
   cardEl.classList.add('card-thinking'); // pause and pulse
   speakBtn.disabled = true;
   break;
  case UX_STATES.SPEAKING_READY:
   hintEl.textContent = "🎤 Now it's your turn! Press 'Speak' and say it!";
   speakBtn.disabled = false;
   // Delay hint visibility slightly
   setTimeout(() => {
    if (uiState === UX_STATES.SPEAKING_READY || uiState === UX_STATES.SPEAKING) {
     document.getElementById('hintBtn').style.display = 'inline-block';
    }
   }, 2000);
   break;
  case UX_STATES.SPEAKING:
   hintEl.textContent = "🔴 Listening... Say the animal's name!";
   cardEl.classList.add('card-speaking'); // Pop the card up
   break;
  case UX_STATES.FEEDBACK:
   document.getElementById('hintBtn').style.display = 'none';
   break;
 }
}

/* ── Load Animal Sequence ── */
function loadAnimal(idx) {
 stopRecognition();
 currentIdx = idx;
 audioPlayed = false;

 // Swipe Transition Macro
 const panel = document.getElementById('mainPanel');
 panel.classList.remove('swipe-in');
 void panel.offsetWidth; // Reflow
 panel.classList.add('swipe-in');

 const a = ANIMALS[idx];
 
 const videoWrapper = document.getElementById('videoWrapper');
 const emojiEl = document.getElementById('animalEmoji');
 const videoEl = document.getElementById('animalVideo');
 
 if (a.video) {
   videoWrapper.style.display = 'block';
   emojiEl.style.display = 'none';
   if (videoEl.getAttribute('src') !== a.video) { 
     videoEl.src = a.video; 
     videoEl.load(); 
   }
   videoEl.muted = true;
   videoEl.play().catch(e=>console.log(e));
 } else {
   videoWrapper.style.display = 'none';
   emojiEl.style.display = 'block';
   emojiEl.textContent = a.emoji;
 }

 document.getElementById('animalName').textContent   = a.name;
 document.getElementById('animalName').className     = 'phonics-say'; // Reset hint mode styling
 document.getElementById('animalPhrase').textContent = a.phrase;
 document.getElementById('animalPhrase').classList.remove('word-blur');
 document.getElementById('stepIndicator').textContent = `Animal ${idx+1} of 10`;

 document.getElementById('hintBtn').style.display = 'none';
 setFeedback('Press 🔊 Hear Sound to begin!', '');

 setUIState(UX_STATES.INTRO);
 updateScore();
}

/* ── HEAR button triggers interactive flow ── */
document.getElementById('hearBtn').addEventListener('click', () => {
 const a = ANIMALS[currentIdx];
 setUIState(UX_STATES.LISTENING);
 setFeedback(`🔊 Playing: "${a.phrase}"...`, '');

 // Neutralize any active hint modes
 document.getElementById('animalName').textContent = a.name;
 document.getElementById('animalName').classList.remove('word-hinted');
 document.getElementById('animalPhrase').classList.remove('word-blur');

 const videoEl = document.getElementById('animalVideo');
 if (a.audio) {
   // User provided a separate audio file override, keep video muted and play audio
   const audioObj = new Audio(a.audio);
   audioObj.play().catch(e=>console.log(e));
 } else if (a.video) {
   videoEl.muted = false;
   videoEl.currentTime = 0;
   videoEl.play().catch(e=>console.log(e));
   // mute again after 2.5 seconds roughly syncing
   setTimeout(() => { videoEl.muted = true; }, 2500);
 }

 speakText(a.phrase, () => {
  audioPlayed = true;
  setUIState(UX_STATES.THINKING);
  setFeedback(`🔊 Sound complete...`, '');
  
  // Wait in thinking state for 1.5s
  setTimeout(() => {
   setUIState(UX_STATES.SPEAKING_READY);
   setFeedback(`🎤 Ready! Press 'Speak Now' and say "${a.name}"`, '');
  }, 1500);
 });
});

/* ── Hint Mode Logic ── */
document.getElementById('hintBtn').addEventListener('click', () => {
 const nameEl = document.getElementById('animalName');
 const a = ANIMALS[currentIdx];
 const firstLetter = a.name.charAt(0);
 const rest = a.name.slice(1).replace(/[a-zA-Z]/g, ' _');
 
 nameEl.textContent = firstLetter + rest;
 nameEl.classList.add('word-hinted');
 document.getElementById('animalPhrase').classList.add('word-blur');
 setFeedback(`💡 Hint: It starts with '${firstLetter}'.`, '');
});

function setFeedback(msg, cls) {
 const fb = document.getElementById('feedbackBox');
 fb.textContent = msg;
 fb.className = 'feedback-box ' + cls;
}

function updateScore() {
 // Update new Skill Mastery Bar
 const fill = document.getElementById('skillBarFill');
 const text = document.getElementById('skillText');
 const pct = (score / 10) * 100;
 
 fill.style.width = pct + '%';
 text.textContent = `🎯 Animal Mastery: ${pct}%`;
 
 if (pct <= 30) fill.style.background = '#e8445a'; // Red
 else if (pct <= 70) fill.style.background = '#ffc107'; // Yellow
 else fill.style.background = '#37a34a'; // Green

 if (score >= 10) {
  try {
   var _c = JSON.parse((window.BB_UserData || window.localStorage).getItem('bb_completed_lessons') || '[]');
   if (!_c.includes('animals')) {
    _c.push('animals');
    (window.BB_UserData || window.localStorage).setItem('bb_completed_lessons', JSON.stringify(_c));
   }
  } catch(e) {}
  setTimeout(showGrandWin, 900);
 }
}

/* ══════════════════════════════════════
 SPEECH RECOGNITION ENGINE
══════════════════════════════════════ */
function stopRecognition() {
 if (recognition && recognitionActive) {
  try { recognition.abort(); } catch(e) {}
  recognitionActive = false;
  if(uiState === UX_STATES.SPEAKING) setUIState(UX_STATES.SPEAKING_READY);
 }
}

const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let _micRetryCount = 0;

if (SpeechRec) {
 function createRecognition() {
  const rec = new SpeechRec();
  rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 10; rec.continuous = false;

  rec.onresult = (evt) => {
   _micRetryCount = 0;
   recognitionActive = false;
   const speakBtn = document.getElementById('speakBtn');
   speakBtn.classList.remove('listening');
   
   const a = ANIMALS[currentIdx];
   const allTranscripts = [];
   for (let r = 0; r < evt.results.length; r++) {
    for (let alt = 0; alt < evt.results[r].length; alt++) {
     allTranscripts.push(evt.results[r][alt].transcript.toLowerCase().trim());
    }
   }
   const heardClean = allTranscripts.join(' ').replace(/[^a-z\s]/g, '').trim();
   const correct = isAnimalMatch(heardClean, a, allTranscripts);

   setUIState(UX_STATES.FEEDBACK);

   if (correct) {
    if (!done[currentIdx]) { score++; done[currentIdx] = true; }
    saveProgress(); updateScore();
    
    document.getElementById('animalCard').className = 'letter-card card-success';
    document.getElementById('aiHint').textContent = "🔥 Brilliant! You nailed it!";
    setFeedback('✅ Perfect! Great job! 🎉', 'correct');
    showConfetti();
    document.getElementById('nextBtn').focus();
   } else {
    document.getElementById('animalCard').className = 'letter-card shake';
    document.getElementById('aiHint').textContent = "Oops! Try again.";
    setFeedback('❌ You said "' + (allTranscripts[0] || '?') + '". Try again — say "' + a.name + '"', 'wrong');
    showErrorGlow();
    setTimeout(() => { if(uiState === UX_STATES.FEEDBACK) setUIState(UX_STATES.SPEAKING_READY); }, 1500);
   }
  };

  rec.onerror = (evt) => {
   recognitionActive = false;
   const speakBtn = document.getElementById('speakBtn');
   speakBtn.classList.remove('listening');
   setUIState(UX_STATES.FEEDBACK);

   if (evt.error === 'no-speech') {
    document.getElementById('animalCard').className = 'letter-card shake';
    setFeedback('🤫 No sound heard! Say the name louder and try again.', 'wrong');
   } else if (evt.error === 'aborted') {
   } else if (evt.error === 'not-allowed') {
    setFeedback('⚠️ Mic blocked. Allow microphone in browser settings.', 'wrong');
   } else {
    setFeedback('⚠️ Mic error: ' + evt.error, 'wrong');
   }
   setTimeout(() => { if(uiState === UX_STATES.FEEDBACK) setUIState(UX_STATES.SPEAKING_READY); }, 2000);
  };

  rec.onend = () => {
   if(recognitionActive) {
    recognitionActive = false;
    document.getElementById('speakBtn').classList.remove('listening');
    if(uiState === UX_STATES.SPEAKING) setUIState(UX_STATES.SPEAKING_READY);
   }
  };
  return rec;
 }
 recognition = createRecognition();
}

function isAnimalMatch(heardClean, animal, allTranscripts) {
 if (!heardClean && (!allTranscripts || allTranscripts.length === 0)) return false;
 const nameLower = animal.name.toLowerCase();
 const alts = animal.alts.map(a => a.toLowerCase());
 const texts = [heardClean, ...(allTranscripts || []).map(t => t.toLowerCase().replace(/[^a-z\s]/g,'').trim())];
 for (const text of texts) {
  if (!text) continue;
  for (const alt of alts) if (text.includes(alt) || alt.includes(text)) return true;
  if (text.includes(nameLower) || nameLower.includes(text)) return true;
  for (const alt of alts) if (levenshtein(text.slice(0, alt.length + 2), alt) <= 1) return true;
  for (const alt of alts) if (alt.length >= 2 && text.startsWith(alt.slice(0, 2))) return true;
 }
 return false;
}
function levenshtein(a, b) {
 const m = a.length, n = b.length;
 const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
 for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++) dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
 return dp[m][n];
}

/* ── SPEAK button ── */
document.getElementById('speakBtn').addEventListener('click', () => {
 if (!audioPlayed) {
  const hearBtn = document.getElementById('hearBtn');
  hearBtn.classList.remove('shake'); void hearBtn.offsetWidth; hearBtn.classList.add('shake');
  setFeedback('👉 Please listen before speaking!', 'wrong');
  return;
 }
 if (!recognition) { alert('Voice features require Chrome or Edge browser!'); return; }
 if (recognitionActive) return;

 recognitionActive = true;
 document.getElementById('speakBtn').classList.add('listening');
 setUIState(UX_STATES.SPEAKING);

 try {
  recognition.start();
 } catch(e) {
  recognitionActive = false;
  document.getElementById('speakBtn').classList.remove('listening');
  if (e.name === 'InvalidStateError') {
   setTimeout(() => {
    try {
     recognitionActive = true;
     document.getElementById('speakBtn').classList.add('listening');
     setUIState(UX_STATES.SPEAKING);
     recognition.start();
    } catch(e2) {
     recognitionActive = false;
     document.getElementById('speakBtn').classList.remove('listening');
     setUIState(UX_STATES.SPEAKING_READY);
    }
   }, 300);
  } else {
   setUIState(UX_STATES.SPEAKING_READY);
  }
 }
});

/* ── Prev / Next Navigation ── */
document.getElementById('prevBtn').addEventListener('click', () => loadAnimal((currentIdx - 1 + 10) % 10));
document.getElementById('nextBtn').addEventListener('click', () => loadAnimal((currentIdx + 1) % 10));

/* ════════════════════════════════════════
 TEXT-TO-SPEECH
════════════════════════════════════════ */
let _bestVoice = null;
function pickBestVoice() {
 const voices = window.speechSynthesis.getVoices();
 if (!voices || voices.length === 0) return null;
 const tiers = [
  v => /google/i.test(v.name) && /en.US/i.test(v.lang), v => /google/i.test(v.name) && /en/i.test(v.lang),
  v => /microsoft/i.test(v.name) && /aria|jenny|guy|natasha/i.test(v.name),
  v => /samantha|karen/i.test(v.name), v => /en.US/i.test(v.lang)
 ];
 for (const tier of tiers) { const match = voices.find(tier); if (match) return match; }
 return voices[0];
}

function speakText(text, onEnd) {
 if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
 window.speechSynthesis.cancel();
 const doSpeak = () => {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.78; u.pitch = 1.05;
  if (!_bestVoice) _bestVoice = pickBestVoice();
  if (_bestVoice) u.voice = _bestVoice;
  if (onEnd) u.onend = onEnd;
  window.speechSynthesis.speak(u);
 };
 const voices = window.speechSynthesis.getVoices();
 if (voices && voices.length > 0) doSpeak();
 else window.speechSynthesis.addEventListener('voiceschanged', function onVoices() {
  window.speechSynthesis.removeEventListener('voiceschanged', onVoices);
  _bestVoice = pickBestVoice();
  doSpeak();
 });
}

/* Confetti & Overlays identical to original (collapsed for brevity but logic present in full above) */
function showConfetti() {
 const overlay = document.getElementById('confetti-overlay');
 overlay.innerHTML = ''; overlay.classList.add('show');
 const colors = ['#F44336','#FFC107','#4CAF50','#2196F3','#9C27B0','#FF5722'];
 for (let i = 0; i < 100; i++) {
  const c = document.createElement('div'); c.className = 'confetti-piece';
  c.style.background = colors[i % colors.length];
  c.style.left = (Math.random() * 100) + '%'; c.style.top = '-20px';
  c.style.animationDuration = (800 + Math.random() * 1200) + 'ms';
  c.style.animationDelay = (Math.random() * 600) + 'ms';
  overlay.appendChild(c);
 }
 setTimeout(() => { overlay.classList.remove('show'); overlay.innerHTML = ''; }, 2600);
}

function showGrandWin() { document.getElementById('grand-win').classList.add('show'); }
function closeGrandWin() { document.getElementById('grand-win').classList.remove('show'); location.href = 'Less.html'; }
function showErrorGlow() {
 const overlay = document.getElementById('error-overlay');
 overlay.classList.add('flash'); setTimeout(() => overlay.classList.remove('flash'), 700);
}

/* ── Boot ── */
loadAnimal(0);
(function() {
 const saved = loadProgress();
 if (saved && saved.score > 0) {
  const firstIncomplete = saved.done.findIndex(d => !d);
  if (firstIncomplete >= 0 && firstIncomplete < 10) {
   setTimeout(() => loadAnimal(firstIncomplete), 250);
  }
 }
})();
