<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <title>Navbar with Video Previews</title>
  <style>
    body {
      margin: 0;
      font-family: "Fugaz one", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: blur(5px);
    }

    /* Navbar */
    .navbar {
      background-color: rgba(75, 42, 173, 0.9);
      -webkit-backdrop-filter: blur(2px);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.823);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 30px;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    /* Logo */
    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navbar .logo img {
      width: 80px;
      height: 55px;
      border-radius: 6px;
    }

    .navbar .logo span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Menu */
    .navbar .menu {
      display: flex;
      gap: 25px;
      position: relative;
    }

    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 5px 8px;
      position: relative;
      transition: all 0.3s ease;
    }

    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      filter: none !important;
    }

    /* Blur other options */
    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }

    /* Right side */
    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }

    .reward img {
      width: 20px;
      height: 20px;
    }

    .profile img {
      width: 70px;
      height: 55px;
      border-radius: 50%;
      border: 0px solid #fff;
    }

    /* Profile Sidebar */
    .profile-sidebar {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.2);
      padding: 20px;
      transition: right 0.3s ease;
      z-index: 200;
      color: #fff;
    }

    .profile-sidebar.active {
      right: 0;
    }

    .profile-sidebar h2 {
      margin-top: 0;
      font-family: "Fugaz One", sans-serif;
    }

    .profile-sidebar p {
      margin: 10px 0;
      font-size: 1rem;
    }

    .profile-sidebar .close-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 20px;
      cursor: pointer;
    }

    /* Content */
    .content {
      padding: 40px;
      position: relative;
      z-index: 1;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.6);
      transition: filter 0.3s ease;
    }

    .menu:hover~.content {
      filter: blur(5px);
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px;
      left: 0;
      width: 200px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }

    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }

    /* Wrapper to center everything */
    .game-wrapper {
      height: calc(100vh - 80px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Grid Layout */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(2, 320px);
      gap: 50px;
    }

    /* Keep your original glass card */
    .trans-box {
      width: 320px;
      height: 180px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 1.4rem;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: float 4s ease-in-out infinite;
    }

    /* Floating animation */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    /* Hover effect */
    .trans-box:hover {
      transform: scale(1.07);
      box-shadow: 0 0 45px rgba(255, 204, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.25);
    }

    /* Small animated emoji */
    .game-emoji {
      font-size: 1.8rem;
      margin-top: 15px;
      animation: pulseEmoji 1.5s infinite;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    }

    @keyframes pulseEmoji {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
  </style>
</head>
