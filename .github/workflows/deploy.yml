# ─────────────────────────────────────────────────────────────────
# BrainBerry CI/CD Pipeline
# Builds Docker image, runs health checks, and pushes to Docker Hub
# ─────────────────────────────────────────────────────────────────

name: BrainBerry CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout Code ────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Build Docker Image ──────────────────────────────
      - name: Build Docker Image
        run: docker build -t brainberry:latest .

      # ── Step 3: Run Container ───────────────────────────────────
      - name: Start Container
        run: |
          docker run -d --name brainberry-test -p 8080:80 brainberry:latest
          echo "⏳ Waiting for nginx to start..."
          sleep 5

      # ── Step 4: Health Check ────────────────────────────────────
      - name: Health Check - Index Page
        run: |
          echo "🔍 Checking index.html..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "   HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Index page failed!"
            exit 1
          fi
          echo "✅ Index page OK"

      # ── Step 5: Verify Key Pages ────────────────────────────────
      - name: Verify Key Pages
        run: |
          PAGES=(
            "front.html"
            "Less.html"
            "parent.html"
            "parent-app.html"
            "phonics.html"
            "animals.html"
            "hindi.html"
            "help.html"
            "rewards.html"
          )

          FAILED=0
          for PAGE in "${PAGES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/$PAGE")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $PAGE → $STATUS"
            else
              echo "❌ $PAGE → $STATUS"
              FAILED=1
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "⚠️ Some pages returned non-200 status codes."
            echo "   This may be expected if those files are gitignored."
          fi

      # ── Step 6: Verify Static Assets ───────────────────────────
      - name: Verify Static Assets
        run: |
          ASSETS=(
            "assets/css/style.css"
            "assets/js/bb-user-data.js"
            "assets/js/profile-panel.js"
            "assets/js/parental-control.js"
          )

          for ASSET in "${ASSETS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/$ASSET")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $ASSET → $STATUS"
            else
              echo "⚠️ $ASSET → $STATUS (may not be in repo)"
            fi
          done

      # ── Step 7: Container Logs ─────────────────────────────────
      - name: Show Container Logs
        if: always()
        run: docker logs brainberry-test

      # ── Step 8: Cleanup Test Container ────────────────────────
      - name: Stop and Remove Test Container
        if: always()
        run: |
          docker stop brainberry-test || true
          docker rm brainberry-test || true
          echo "🧹 Test container removed"

      # ── Step 9: Login to Docker Hub ───────────────────────────
      # Only runs on push to main (not on pull requests)
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 10: Set up Docker Buildx ─────────────────────────
      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      # ── Step 11: Build & Push to Docker Hub ───────────────────
      - name: Build and Push to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            darshan7887/brainberry:latest
            darshan7887/brainberry:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 12: Summary ──────────────────────────────────────
      - name: Deployment Summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "🚀 ─────────────────────────────────────────"
          echo "✅  BrainBerry pushed to Docker Hub!"
          echo "📦  Image: darshan7887/brainberry:latest"
          echo "🏷️   Tag:   darshan7887/brainberry:${{ github.sha }}"
          echo "🐳  Run:   docker run -d -p 8080:80 darshan7887/brainberry:latest"
          echo "🌐  Open:  http://localhost:8080"
          echo "────────────────────────────────────────────"
