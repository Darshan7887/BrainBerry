<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <title>Mission 1: Fill in the Blanks – BrainBerry</title>
  
  <style>
    /* ── Base ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Fugaz One", sans-serif;
      background: #f6f6f9;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background video ───────────────────────────────────────────── */
    .bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }
    #colorGlowOverlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background: rgba(20, 10, 30, 0.45); /* Lighter overlay for visibility */
      backdrop-filter: blur(3px); /* Much softer blur */
    }

    /* ── Navbar ─────────────────────────────────────────────────────── */
    .navbar {
      background: rgba(75, 42, 173, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
    }
    .navbar .logo { display: flex; align-items: center; gap: 8px; }
    .navbar .logo img { width: 80px; height: 55px; border-radius: 6px; }
    .navbar .logo span { font-size: 1.2rem; font-weight: bold; }
    .navbar .menu { display: flex; gap: 25px; }
    .navbar .menu a {
      text-decoration: none; color: #fff; font-weight: 500;
      font-size: 0.95rem; padding: 5px 8px; transition: all 0.3s ease;
    }
    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
    }
    .navbar .right { display: flex; align-items: center; gap: 15px; }
    .reward { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
    .reward img { width: 20px; height: 20px; }
    .profile img { width: 70px; height: 55px; border-radius: 50%; }

    /* ── Page wrapper ───────────────────────────────────────────────── */
    .page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      min-height: calc(100vh - 71px);
    }

    /* ── Top Progress Tracker ───────────────────────────────────────── */
    .progress-container {
      display: flex;
      align-items: center;
      gap: 15px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 25px;
    }
    .progress-bar-bg {
      flex: 1;
      height: 18px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      width: 0%;
      border-radius: 20px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
    }
    .streak-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.5);
      color: #fb923c;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 1.1rem;
      border: 1px solid rgba(251, 146, 60, 0.4);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .streak-badge.show { opacity: 1; animation: pop 0.4s ease; }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* ── Main game card ─────────────────────────────────────────────── */
    .game-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 40px 35px;
      color: #fff;
      width: 100%;
      max-width: 650px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .question-label {
      font-size: 1.2rem;
      color: #cbd5e1;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .question-label i { font-size: 1.6rem; }

    .question-text {
      font-size: 2.2rem;
      margin: 0 0 40px;
      color: #fff;
      line-height: 1.4;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .question-text .blank {
      display: inline-block;
      min-width: 120px;
      height: 3.5rem;
      border-bottom: 4px solid #fff;
      margin: 0 8px;
      vertical-align: middle;
      color: #ffcc00;
      text-align: center;
      transition: 0.3s;
    }

    /* ── Action Buttons (Voice) ─────────────────────────────────────── */
    .action-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    .btn-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-read { background: #3b82f6; color: #fff; }
    .btn-read:hover { background: #2563eb; transform: translateY(-2px); }
    .btn-mic { background: #10b981; color: #fff; }
    .btn-mic:hover { background: #059669; transform: translateY(-2px); }
    .btn-mic.recording { animation: pulse 1s infinite alternate; background: #ef4444; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      100% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
    }

    /* ── Options Grid (Duolingo Style Buttons) ──────────────────────── */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .btn-option {
      background: #ffffff;
      border: 2px solid #e5e5e5;
      border-bottom-width: 4px;
      border-radius: 16px;
      color: #4b4b4b;
      font-family: inherit;
      font-size: 1.4rem;
      padding: 16px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-option:hover:not(:disabled) {
      background: #f3f4f6;
      border-color: #d1d5db;
    }
    .btn-option:active:not(:disabled) {
      border-bottom-width: 2px;
      transform: translateY(2px);
    }
    .btn-option:disabled { cursor: not-allowed; opacity: 0.6; }
    
    .btn-option.correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #16a34a;
    }
    .btn-option.correct:active { border-bottom-width: 4px; transform: none; }

    .btn-option.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #dc2626;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* ── Bottom Feedback Tray ───────────────────────────────────────── */
    .feedback-tray {
      position: fixed;
      bottom: -150px; left: 0; width: 100%;
      padding: 30px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }
    .feedback-tray.show { bottom: 0; }
    .feedback-tray.correct { background: #dcfce7; border-top: 2px solid #22c55e; }
    .feedback-tray.wrong { background: #fee2e2; border-top: 2px solid #ef4444; }
    
    .fb-message {
      font-size: 2rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .correct .fb-message { color: #16a34a; }
    .wrong .fb-message { color: #dc2626; }

    /* ── Game Over panel ────────────────────────────────────────────── */
    .game-over {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      background: rgba(0,0,0,0.85);
      border-radius: 16px;
      padding: 50px 30px;
      color: #fff;
      width: 100%;
      max-width: 600px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .game-over.show { display: flex; animation: fadeUp 0.6s ease; }
    @keyframes fadeUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .game-over h2 { font-size: 2.5rem; margin: 0; color: #ffcc00; }
    .btn-restart {
      background: linear-gradient(135deg, #10b981, #059669);
      border: none; border-radius: 50px;
      padding: 16px 44px;
      font-family: inherit; font-size: 1.2rem; color: #fff; cursor: pointer;
      box-shadow: 0 4px 18px rgba(16,185,129,0.5);
      transition: transform 0.15s;
    }
    .btn-restart:hover { transform: scale(1.05); }

    /* ── Confetti canvas ────────────────────────────────────────────── */
    #confettiCanvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;
    }
  </style>
</head>
<body>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas"></canvas>
  <div id="colorGlowOverlay"></div>

  <!-- Background video -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="assets/videos/fibc.mp4" type="video/mp4" />
  </video>

  <!-- Navbar -->
  <div class="navbar">
    <a href="front.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:8px;" title="Go Home">
      <div class="logo">
        <img src="assets/images/Screenshot 2025-09-14 134929.png" alt="Logo">
        <span>BrainBerry</span>
      </div>
    </a>
    <div class="menu">
      <a href="front.html">Home</a>
      <a href="challen.html">Challenges</a>
      <a href="chal.html">Games</a>
      <a href="Less.html">Lessons</a>
      <a href="rewards.html">Rewards</a>
      <a href="help.html">Help</a>
    </div>
    <div class="right">
      <div class="reward"><img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" alt="Gem"><span>0</span></div>
      <div class="reward"><img src="https://cdn-icons-png.flaticon.com/512/138/138281.png" alt="Coin"><span>0</span></div>
      <div class="profile"><img src="assets/images/dp-cactus-20.png" alt="User"></div>
    </div>
  </div>

  <div class="page-wrapper">
    <!-- Top Progress -->
    <div class="progress-container" id="progContainer">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progFill"></div>
      </div>
      <div class="streak-badge" id="streakBadge">🔥 <span id="streakVal">0</span></div>
    </div>

    <!-- Main Game Card -->
    <div class="game-card" id="gameCard">
      <div class="question-label">
        <span>🎯 Choose the correct answer</span>
      </div>

      <!-- Question Text with dynamic blank -->
      <div class="question-text" id="questionText">
        <!-- Injected via JS -->
      </div>

      <!-- Read / Mic Actions -->
      <div class="action-row">
        <button class="btn-circle btn-read" id="btnRead" onclick="readQuestion()" title="Read out loud">🔊</button>
        <button class="btn-circle btn-mic" id="btnMic" title="Voice Answer Mode">🎤</button>
      </div>

      <!-- Options -->
      <div class="options-grid" id="optionsGrid">
        <!-- Injected via JS -->
      </div>
    </div>

    <!-- Game Over -->
    <div class="game-over" id="gameOver">
      <div style="font-size:5rem;">🏆</div>
      <h2>Lesson Complete!</h2>
      <p style="font-size:1.3rem;">You scored <strong id="finalScore" style="color:#facc15">0</strong> XP</p>
      <div style="display:flex; gap:15px; margin-top:20px;">
        <button class="btn-restart" style="background:linear-gradient(135deg, #3b82f6, #2563eb);" onclick="location.reload()">🔄 Play Again</button>
        <button class="btn-restart" onclick="location.href='challen.html'">🏡 Mission Control</button>
      </div>
    </div>
  </div>

  <!-- Bottom Feedback Tray -->
  <div class="feedback-tray" id="feedbackTray">
    <div class="fb-message" id="fbMessage">✅ Correct!</div>
    <div style="flex:1"></div>
    <!-- Hidden auto-advance button, visual only in this flow -->
  </div>

  <!-- Use the dedicated JS with cache-buster -->
  <script src="assets/js/fibc.js?v=2"></script>
  <script src="assets/js/profile-panel.js"></script>
  <script src="assets/js/parental-control.js"></script>
</body>
</html>
