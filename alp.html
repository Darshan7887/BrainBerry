<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
 <title>Magic of Words | BrainBerry</title>
 <style>
 body {
 margin: 0;
 font-family: "Fugaz One", sans-serif;
 background: #f6f6f9;
 }

 /* Background video */
 .bg-video {
 position: fixed;
 top: 0; left: 0;
 width: 100%; height: 100%;
 object-fit: cover;
 z-index: -1;
 }

 /* Navbar */
 .navbar {
 background: rgba(75, 42, 173, 0.9);
 backdrop-filter: blur(10px);
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: 8px 20px;
 color: #fff;
 position: relative;
 z-index: 100;
 }
 .navbar .logo { display: flex; align-items: center; gap: 8px; }
 .navbar .logo img { width: 80px; height: 55px; border-radius: 6px; }
 .navbar .logo span { font-size: 1.2rem; font-weight: bold; }
 .navbar .menu { display: flex; gap: 25px; position: relative; }
 .navbar .menu a {
 text-decoration: none; color: #fff; font-weight: 500;
 font-size: 0.95rem; padding: 5px 8px; position: relative;
 transition: all 0.3s ease;
 }
 .navbar .menu a:hover {
 color: #ffcc00; background: rgba(255,255,255,0.15);
 border-radius: 6px; filter: none !important;
 }
 .navbar .menu:hover a:not(:hover) { filter: blur(2px) brightness(70%); }
 .navbar .right { display: flex; align-items: center; gap: 15px; }
 .reward { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
 .reward img { width: 20px; height: 20px; }
 .profile img { width: 70px; height: 55px; border-radius: 50%; border: 0px solid #fff; }

 /* Video preview on nav hover */
 .video-preview {
 position: absolute; top: 40px; left: 0;
 width: 200px; height: 120px; border-radius: 8px;
 overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
 opacity: 0; pointer-events: none;
 transition: opacity 0.3s ease; background: #000; z-index: 20;
 }
 .video-preview video { width: 100%; height: 100%; object-fit: cover; }
 .navbar .menu a:hover .video-preview { opacity: 1; }

 /* Landing: centered two-card layout */
 .landing-container {
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 min-height: calc(100vh - 72px);
 gap: 28px;
 padding: 20px;
 position: relative;
 z-index: 5;
 }

 .landing-title {
 font-size: 2rem;
 color: #fff;
 text-shadow: 0 3px 10px rgba(0,0,0,0.5);
 text-align: center;
 letter-spacing: 1px;
 }

 .card-row {
 display: flex;
 gap: 30px;
 flex-wrap: wrap;
 justify-content: center;
 }

 /* Small glassmorphism card matches inner-box / lesson-box style */
 .mode-card {
 width: 200px;
 padding: 32px 24px;
 background: rgba(255, 255, 255, 0.20);
 backdrop-filter: blur(10px);
 -webkit-backdrop-filter: blur(10px);
 border-radius: 15px;
 border: 1px solid rgba(255, 255, 255, 0.35);
 box-shadow: 0 4px 30px rgba(0,0,0,0.18);
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 14px;
 cursor: pointer;
 transition: transform 0.28s ease, box-shadow 0.28s ease, background 0.28s ease;
 text-align: center;
 user-select: none;
 }
 .mode-card:hover {
 transform: scale(1.05);
 background: rgba(255, 255, 255, 0.32);
 box-shadow: 0 8px 40px rgba(255,200,0,0.45);
 }
 .mode-card .card-icon {
 font-size: 2.8rem;
 line-height: 1;
 }
 .mode-card .card-label {
 font-size: 1.05rem;
 font-weight: 800;
 color: #fff;
 text-shadow: 0 1px 4px rgba(0,0,0,0.45);
 }
 .mode-card .card-sub {
 font-size: 0.72rem;
 color: rgba(255,255,255,0.75);
 font-family: sans-serif;
 font-weight: 500;
 line-height: 1.4;
 }

 .back-link {
 font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.75);
 cursor: pointer; text-decoration: underline; transition: color 0.2s;
 }
 .back-link:hover { color: #ffcc00; }
</style>
</head>
