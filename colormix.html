<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <title>Mission 6: Color Mix Lab – BrainBerry</title>

  <style>
    /* ── Base ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Fugaz One", sans-serif;
      background: #0f172a; /* Chemistry Dark vibe */
      min-height: 100vh;
      overflow-x: hidden;
      color: #fff;
    }

    /* ── Background video ───────────────────────────────────────────── */
    .bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
      opacity: 0.8;
      filter: saturate(1.2) hue-rotate(-20deg);
    }

    /* ── Navbar ─────────────────────────────────────────────────────── */
    .navbar {
      background: rgba(30, 20, 60, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .navbar .logo { display: flex; align-items: center; gap: 8px; }
    .navbar .logo img { width: 80px; height: 55px; border-radius: 6px; }
    .navbar .logo span { font-size: 1.2rem; font-weight: bold; }
    .navbar .menu { display: flex; gap: 25px; }
    .navbar .menu a {
      text-decoration: none; color: #fff; font-weight: 500;
      font-size: 0.95rem; padding: 5px 8px; transition: all 0.3s ease;
    }
    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
    }
    .navbar .right { display: flex; align-items: center; gap: 15px; }
    .reward { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
    .reward img { width: 20px; height: 20px; }
    .profile img { width: 70px; height: 55px; border-radius: 50%; }

    /* ── Page wrapper ───────────────────────────────────────────────── */
    .page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: calc(100vh - 71px);
    }

    /* ── Laboratory Banner ─────────────────────────────────────────── */
    .lab-box {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 20px 30px;
      color: #fff;
      margin-bottom: 20px;
      width: 100%;
      max-width: 800px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .lab-box h2 { font-size: 2.2rem; margin: 0 0 10px; background: linear-gradient(135deg, #a855f7, #3b82f6); -webkit-background-clip:text; color:transparent; }
    .lab-box p { font-size: 1.1rem; color: #d4d4d8; margin: 0; }

    /* HUD */
    .hud {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 20px;
      width: 100%;
    }
    .hud-pill {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50px;
      padding: 10px 24px;
      color: #fff;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #scoreDisplay { color: #facc15; }

    /* ── Arena ──────────────────────────────────────────────────────── */
    .arena-card {
      background: rgba(15, 23, 42, 0.85);
      border-radius: 16px;
      padding: 30px;
      color: #fff;
      width: 100%;
      max-width: 800px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      text-align: center;
      position: relative;
    }

    .question-label {
      font-size: 2.2rem;
      color: #fff;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }
    .target-highlight {
      display: inline-block;
      padding: 4px 18px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 4px 15px rgba(255,255,255,0.1);
      text-transform: uppercase;
    }

    /* ── Chemistry Flask (Drop Zone) ────────────────────────────────── */
    .flask-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }
    .flask {
      width: 180px;
      height: 220px;
      border: 8px solid rgba(255,255,255,0.8);
      border-top-width: 0;
      border-bottom-left-radius: 90px;
      border-bottom-right-radius: 90px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 -10px 30px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.5);
      transition: border-color 0.3s;
      background: rgba(255,255,255,0.05); /* very subtle back-glass */
    }
    /* ── High End Glass Reflection ── */
    .flask::before {
      content: '';
      position: absolute;
      top: 5px; left: 15px; width: 20px; height: 90%;
      background: linear-gradient(to right, rgba(255,255,255,0.4), transparent);
      border-radius: 50px;
      z-index: 10;
      pointer-events: none;
    }
    .flask.drag-over {
      border-color: #facc15;
      transform: scale(1.05);
    }
    .flask-neck {
      width: 60px;
      height: 40px;
      border: 8px solid rgba(255,255,255,0.8);
      border-bottom-width: 0;
      margin-bottom: -8px;
      z-index: 2;
    }
    .flask-lip {
      width: 80px;
      height: 15px;
      background: rgba(255,255,255,0.8);
      border-radius: 8px;
      margin-bottom: -5px;
      z-index: 3;
    }
    
    /* Liquid fill mapping */
    .liquid {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      transition: height 0.5s ease-in-out, background 0.5s ease-in-out, box-shadow 0.5s;
    }
    /* Wave animation class */
    .liquid::after {
      content: '';
      position: absolute;
      top: -10px; left: -50%;
      width: 200%; height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: wave 2s infinite linear;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .liquid.filling::after { opacity: 1; }

    @keyframes wave {
      0% { transform: translateX(0) scaleY(1); }
      50% { transform: translateX(-25%) scaleY(1.3); }
      100% { transform: translateX(-50%) scaleY(1); }
    }

    /* Wrong Shake */
    .flask-container.wrong-shake {
      animation: wrshake 0.5s ease;
    }
    @keyframes wrshake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-15px) rotate(-8deg); }
      40% { transform: translateX(15px) rotate(8deg); }
      60% { transform: translateX(-15px); }
      80% { transform: translateX(15px); }
    }
    /* Poof explosion for success */
    .flask-container.success-pop {
        animation: successPop 0.8s ease;
    }
    @keyframes successPop {
        0% { transform: scale(1); filter: brightness(1); }
        30% { transform: scale(1.2); filter: brightness(1.5); }
        100% { transform: scale(1); filter: brightness(1); }
    }

    /* ── Ingredients (Drag Items) ───────────────────────────────────── */
    .ingredients {
      display: flex;
      justify-content: center;
      gap: 30px;
    }
    .orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      cursor: grab;
      box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), 0 8px 15px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }
    .orb:hover { transform: translateY(-5px) scale(1.1); }
    .orb:active { cursor: grabbing; transform: scale(0.9); }
    
    .orb[data-color="red"] { background: radial-gradient(circle at 30% 30%, #f87171, #dc2626); }
    .orb[data-color="blue"] { background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb); }
    .orb[data-color="yellow"] { background: radial-gradient(circle at 30% 30%, #fef08a, #ca8a04); }

    /* ── Progress Indicators ─────────────────────────────────────────── */
    .rounds-indicator {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .round-dot {
      width: 15px; height: 15px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s;
    }
    .round-dot.active { background: #facc15; box-shadow: 0 0 10px #facc15; }

    /* ── Level Complete UI ─────────────────────────────────────────── */
    .game-over {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      background: rgba(0,0,0,0.85);
      border-radius: 16px;
      padding: 50px 30px;
      width: 100%;
      max-width: 800px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      position: absolute;
      inset: 0;
      z-index: 50;
    }
    .game-over.show { display: flex; animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .btn-restart {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none; border-radius: 50px;
      padding: 16px 44px;
      font-family: "Fugaz One", sans-serif;
      font-size: 1.1rem; color: #fff; cursor: pointer;
      transition: transform 0.15s;
    }
    .btn-restart:hover { transform: scale(1.07); }

    /* Confetti */
    #confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
  </style>
</head>
<body>

  <canvas id="confettiCanvas"></canvas>

  <video autoplay muted loop playsinline class="bg-video">
    <!-- Using same video, filters map giving it a deep purple-lab vibe -->
    <source src="assets/videos/dream.mp4" type="video/mp4" />
  </video>

  <!-- Navbar -->
  <div class="navbar">
    <a href="front.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:8px;">
      <div class="logo">
        <img src="assets/images/Screenshot 2025-09-14 134929.png" alt="Logo">
        <span>BrainBerry</span>
      </div>
    </a>
    <div class="menu">
      <a href="front.html">Home</a>
      <a href="challen.html">Challenges</a>
      <a href="chal.html">Games</a>
      <a href="Less.html">Lessons</a>
    </div>
    <div class="right">
      <div class="profile"><img src="assets/images/dp-cactus-20.png" alt="User"></div>
    </div>
  </div>

  <div class="page-wrapper">
    <div class="lab-box">
      <h2>🧪 Color Mix Lab</h2>
      <p>Drag primary colors into the flask to synthesize new compounds!</p>
    </div>

    <div class="hud">
      <div class="hud-pill" id="scoreDisplay">⭐ Mastery: <span id="scoreVal">0</span> XP</div>
      <div class="hud-pill" style="color:#ef4444;" id="livesDisplay">❤️ 3</div>
    </div>

    <!-- Main Game Area -->
    <div class="arena-card" id="gameCard">
      
      <div class="rounds-indicator" id="dotsContainer" style="align-items:center;">
         <span id="levelText" style="margin-right:15px; font-size:1.3rem; color:#60a5fa; font-weight:bold;">Level 1 / 3</span>
         <!-- Injected via JS -->
      </div>

      <div class="question-label" style="background:rgba(0,0,0,0.4); padding: 15px; border-radius:12px; display:inline-block; margin-bottom: 30px;">
        🎯 Create: <span class="target-highlight" id="targetColorText" style="margin-left:8px;">PURPLE</span>
      </div>

      <div class="flask-container" id="flaskContainer">
        <div class="flask-lip"></div>
        <div class="flask-neck"></div>
        <div class="flask" id="mainFlask">
          <div class="liquid" id="liquid"></div>
        </div>
      </div>

      <div class="ingredients" id="orbs">
        <div class="orb" draggable="true" data-color="red" ondragstart="drag(event)"></div>
        <div class="orb" draggable="true" data-color="blue" ondragstart="drag(event)"></div>
        <div class="orb" draggable="true" data-color="yellow" ondragstart="drag(event)"></div>
      </div>

      <!-- End Screen -->
      <div class="game-over" id="gameOver">
        <div style="font-size:5rem; line-height:1.1;">🏆</div>
        <h2>Experiment Complete!</h2>
        <p>Total Synthesis Score: <strong id="finalScore" style="color:#facc15; font-size:1.5rem;">0</strong></p>
        <div style="display:flex; gap:15px; justify-content:center; margin-top:20px;">
          <button class="btn-restart" onclick="location.reload()">🔄 Retry Experiment</button>
          <button class="btn-restart" style="background:linear-gradient(135deg,#059669,#10b981)" onclick="location.href='challen.html'">🏡 Mission Control</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    /* ── Logic State ── */
    // Target combinations map
    const recipes = [
        { targetKey: 'purple', name: 'PURPLE', hex: '#a855f7', glow: 'rgba(168,85,247,0.8)', reqs: ['red', 'blue'] },
        { targetKey: 'green',  name: 'GREEN',  hex: '#22c55e', glow: 'rgba(34,197,94,0.8)',  reqs: ['blue', 'yellow'] },
        { targetKey: 'orange', name: 'ORANGE', hex: '#f97316', glow: 'rgba(249,115,22,0.8)', reqs: ['red', 'yellow'] }
    ];

    const baseHex = {
        'red': '#ef4444',
        'blue': '#3b82f6',
        'yellow': '#eab308'
    };

    let playQueue = [...recipes]; // We will pop these until empty
    let currentRoundObj = null;
    let score = 0;
    let lives = 3;
    let currentMix = []; // Holds the 0, 1, or 2 strings dropped

    // Elements
    const flask = document.getElementById('mainFlask');
    const flaskContainer = document.getElementById('flaskContainer');
    const liquid = document.getElementById('liquid');

    function playSfx(type) {
      const sfx = new Audio('assets/audio/click.mp3');
      sfx.volume = 0.6;
      sfx.play().catch(e => {});
    }

    function initRounds() {
        const dots = document.getElementById('dotsContainer');
        const lvl = document.getElementById('levelText');
        dots.innerHTML = '';
        dots.appendChild(lvl);

        recipes.forEach((_, i) => {
            let d = document.createElement('div');
            d.className = 'round-dot';
            d.id = 'dot-' + i;
            dots.appendChild(d);
        });
        
        // Shuffle queue
        for (let i = playQueue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [playQueue[i], playQueue[j]] = [playQueue[j], playQueue[i]];
        }
        
        loadNextRound();
    }

    function loadNextRound() {
        if(lives <= 0) {
            endGame(false);
            return;
        }

        if(playQueue.length === 0) {
            endGame(true);
            return;
        }

        // Pop next
        currentRoundObj = playQueue[playQueue.length - 1]; // read last
        
        // Update UI
        let rIndex = recipes.length - playQueue.length;
        document.getElementById('dot-' + rIndex).classList.add('active');
        document.getElementById('levelText').textContent = `Level ${rIndex + 1} / ${recipes.length}`;

        const tText = document.getElementById('targetColorText');
        tText.textContent = currentRoundObj.name;
        tText.style.color = currentRoundObj.hex;
        tText.style.boxShadow = `0 4px 20px ${currentRoundObj.hex}60`; // hex with transparency
        
        announce("Make " + currentRoundObj.name);

        resetFlask();
    }

    function announce(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.9;
        utter.pitch = 1.1;
        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Google') || v.name.includes('Samantha')));
        if(preferred) utter.voice = preferred;
        window.speechSynthesis.speak(utter);
    }

    /* ── Drag & Drop Handlers ── */
    function drag(ev) {
        ev.dataTransfer.setData("color", ev.target.dataset.color);
    }

    flask.addEventListener("dragover", function(ev) {
        ev.preventDefault();
        flask.classList.add('drag-over');
    });

    flask.addEventListener("dragleave", function(ev) {
        flask.classList.remove('drag-over');
    });

    flask.addEventListener("drop", function(ev) {
        ev.preventDefault();
        flask.classList.remove('drag-over');
        
        let color = ev.dataTransfer.getData("color");
        if(color && currentMix.length < 2) {
            handleDrop(color);
        }
    });

    function handleDrop(colorKey) {
        playSfx();
        currentMix.push(colorKey);

        if(currentMix.length === 1) {
            // First drop - fill flask halfway with color
            liquid.classList.add('filling');
            liquid.style.height = '50%';
            liquid.style.background = baseHex[colorKey];
            liquid.style.boxShadow = `0 0 30px ${baseHex[colorKey]}`;
        }
        else if (currentMix.length === 2) {
            // Second drop - evaluate mix
            let reqs = [...currentRoundObj.reqs];
            let supplied = [...currentMix];
            // Sort both to compare arrays easily (order shouldn't matter)
            reqs.sort();
            supplied.sort();

            if(reqs[0] === supplied[0] && reqs[1] === supplied[1]) {
                // Success
                liquid.style.height = '100%';
                liquid.style.background = currentRoundObj.hex;
                liquid.style.boxShadow = `0 0 80px ${currentRoundObj.glow}`;
                flaskContainer.classList.add('success-pop');
                score += 50;
                document.getElementById('scoreVal').textContent = score;

                // Fire success particles
                createFloatingText('✔️ Brillant!', '#22c55e');

                setTimeout(() => {
                    flaskContainer.classList.remove('success-pop');
                    playQueue.pop(); // remove solved round
                    loadNextRound();
                }, 1500);

            } else {
                // Failure
                liquid.style.height = '100%';
                liquid.style.background = '#4b5563'; // muddy brown/gray
                flaskContainer.classList.add('wrong-shake');
                createFloatingText('❌ Incorrect Mix', '#ef4444');
                
                lives--;
                document.getElementById('livesDisplay').innerHTML = `❤️ ${lives}`;

                setTimeout(() => {
                    flaskContainer.classList.remove('wrong-shake');
                    if(lives > 0) resetFlask(); // let them try again
                    else endGame(false);
                }, 1000);
            }
        }
    }

    function resetFlask() {
        currentMix = [];
        liquid.style.height = '0%';
        liquid.classList.remove('filling');
        setTimeout(() => {
            liquid.style.background = 'transparent';
            liquid.style.boxShadow = 'none';
        }, 500); // allow transition to bottom before changing color back
    }

    function createFloatingText(text, color) {
        const rect = flaskContainer.getBoundingClientRect();
        const floatEl = document.createElement('div');
        floatEl.textContent = text;
        floatEl.style.position = 'fixed';
        floatEl.style.left = (rect.left + rect.width / 2) + 'px';
        floatEl.style.top = (rect.top - 20) + 'px';
        floatEl.style.color = color;
        floatEl.style.fontSize = '2.5rem';
        floatEl.style.fontWeight = 'bold';
        floatEl.style.textShadow = '0 3px 10px rgba(0,0,0,0.8)';
        floatEl.style.pointerEvents = 'none';
        floatEl.style.zIndex = 1000;
        floatEl.style.transform = 'translate(-50%, -50%)';
        floatEl.style.transition = 'all 0.8s ease-out';
        document.body.appendChild(floatEl);

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                floatEl.style.transform = 'translate(-50%, -120px)';
                floatEl.style.opacity = '0';
            });
        });

        setTimeout(() => floatEl.remove(), 800);
    }

    function endGame(victory) {
        document.getElementById('orbs').style.display = 'none';
        
        let progress = 0;
        if(victory) {
            progress = 100;
            triggerConfetti();
        } else {
            progress = Math.round((score / 150) * 100);
        }

        document.getElementById('finalScore').textContent = score;
        document.getElementById('gameOver').classList.add('show');

        // Write directly to Dashboard Mission Control hook
        localStorage.setItem("mission6_progress", progress.toString());
    }

    /* ── Physics Confetti ── */
    const ctx = document.getElementById('confettiCanvas').getContext('2d');
    const cCanvas = document.getElementById('confettiCanvas');
    cCanvas.width = window.innerWidth;
    cCanvas.height = window.innerHeight;

    let particles = [];
    const colors = ['#a855f7', '#22c55e', '#f97316', '#ef4444', '#3b82f6', '#eab308'];
    
    function triggerConfetti() {
        for(let i=0; i<150; i++) {
            particles.push({
                x: cCanvas.width/2, y: cCanvas.height/2 + 100,
                vx: (Math.random()-0.5)*25,
                vy: (Math.random()-1)*25,
                size: Math.random()*8 + 4,
                color: colors[Math.floor(Math.random()*colors.length)],
                life: 100 + Math.random()*40
            });
        }
        drawConfetti();
    }

    function drawConfetti() {
        ctx.clearRect(0, 0, cCanvas.width, cCanvas.height);
        let active = false;
        particles.forEach(p => {
            if(p.life <= 0) return;
            active = true;
            p.life--;
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.5; // gravity
            p.vx *= 0.98; // friction

            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 50 > 1 ? 1 : p.life / 50;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        });
        if(active) requestAnimationFrame(drawConfetti);
        else ctx.clearRect(0,0,cCanvas.width,cCanvas.height);
    }

    // Auto-start
    window.onload = initRounds;

  </script>
</body>
</html>
