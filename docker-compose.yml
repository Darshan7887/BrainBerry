# ─────────────────────────────────────────────────────────────────
# BrainBerry – Docker Compose
# One-command local run using the pre-built Docker Hub image
#
# Usage:
#   docker compose up -d        ← start
#   docker compose down         ← stop
#   docker compose logs -f      ← view logs
# ─────────────────────────────────────────────────────────────────

version: "3.9"

services:
  brainberry:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: brainberry

    ports:
      - "8080:80"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
