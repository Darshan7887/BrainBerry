<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <title>Navbar with Video Previews</title>
  <style>
    body {
      margin: 0;
      font-family: "Fugaz one", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background: rgba(75, 42, 173, 0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    /* Logo */
    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar .logo img {
      width: 80px;
      height: 55px;
      border-radius: 6px;
    }
    .navbar .logo span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Menu */
    .navbar .menu {
      display: flex;
      gap: 25px;
      position: relative;
    }
    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 5px 8px;
      position: relative;
      transition: all 0.3s ease;
    }

    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      filter: none !important;
    }

    /* Blur other options */
    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }

    /* Right side */
    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }
    .reward img {
      width: 20px;
      height: 20px;
    }
    .profile img {
      width: 70px;
      height: 55px;
      border-radius: 50%;
      border: 0px solid #fff;
    }
     /* Profile Sidebar */
    .profile-sidebar {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
      padding: 20px;
      transition: right 0.3s ease;
      z-index: 200;
      color: #fff;
    }
    .profile-sidebar.active {
      right: 0;
    }
    .profile-sidebar h2 {
      margin-top: 0;
      font-family: "Fugaz One", sans-serif;
    }
    .profile-sidebar p {
      margin: 10px 0;
      font-size: 1rem;
    }
    .profile-sidebar .close-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 20px;
      cursor: pointer;
    }

    /* Content */
    .content {
      padding: 40px;
      position: relative;
      z-index: 1;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      transition: filter 0.3s ease;
    }
    .menu:hover ~ .content {
      filter: blur(5px);
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px;
      left: 0;
      width: 200px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }
    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }
    /* Main container for vertical layout */
.main-boxes {
  display: flex;
  flex-direction: column;
  gap: 40px;
  margin: 40px 20px;
}

/* Outer box */
.box {
  background: rgba(255, 255, 255, 0.15);
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 15px;
  padding: 20px;
  color: #fff;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Title on top */
.box h2 {
  font-size: 1.4rem;
  margin-bottom: 20px;
  text-align: center;
  text-shadow: 0 2px 5px rgba(0,0,0,0.7);
}

/* Inner boxes row */
.inner-boxes {
  display: flex;
  justify-content: space-around;
  gap: 20px;
}

/* Inner video box with border */
.inner-box {
  flex: 1;
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Video */
.inner-box video {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-bottom: 2px solid rgba(255,255,255,0.3);
}

/* Description */
.inner-box .desc {
  padding: 10px;
  font-size: 0.9rem;
  text-align: center;
  color: #fff;
}

  </style>
 
</head>
