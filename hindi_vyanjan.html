<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <title>स्वर – Hindi Vowels | BrainBerry</title>
  <style>
    body {
      margin: 0;
      font-family: "Fugaz One", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: blur(4px) brightness(0.6);
    }

    /* Navbar */
    .navbar {
      background: rgba(75, 42, 173, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 100;
    }

    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navbar .logo img {
      width: 80px;
      height: 55px;
      border-radius: 6px;
    }

    .navbar .logo span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .navbar .menu {
      display: flex;
      gap: 25px;
      position: relative;
    }

    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 5px 8px;
      position: relative;
      transition: all 0.3s ease;
    }

    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      filter: none !important;
    }

    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }

    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }

    .reward img {
      width: 20px;
      height: 20px;
    }

    .profile img {
      width: 70px;
      height: 55px;
      border-radius: 50%;
      border: 0px solid #fff;
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px;
      left: 0;
      width: 200px;
      height: 120px;
      border-radius: 8px;
      overflow: visible;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }

    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }

    /* ─── FLASHCARD WRAPPER (SINGLE CLEAN BLOCK) ─── */
    .phonics-wrapper {
      width: 500px;
      max-width: 95%;
      margin: 30px auto;
      padding: 30px;
      border-radius: 24px;
      /* Glowing transparent glassmorphism */
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      border-left: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25), inset 0 0 20px rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 5;
    }

    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

    .carousel-container {
      width: 100%;
      height: 220px;
      position: relative;
      overflow: hidden;
      margin: 5px 0;
    }

    .carousel-track {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .carousel-card {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      margin: auto;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
      opacity: 0;
      pointer-events: none;
      transform: translateX(80px);
      background: transparent;
      box-shadow: none;
      border: none;
    }

    .carousel-card.active-card {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
      z-index: 10;
    }
    .carousel-card.slide-left {
      transform: translateX(-80px);
      opacity: 0;
    }
    .carousel-card.slide-right {
      transform: translateX(80px);
      opacity: 0;
    }

    .carousel-card.active-card:hover {
      transform: scale(1.03);
    }
    .carousel-card.active-card.jump .big-letter {
      transform: scale(1.15) translateY(-5px);
    }

    /* ─── THE LETTER (HERO) ─── */
    .big-letter {
      font-size: 96px;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      display: inline-block;
      padding: 5px 15px;
      animation: breatheZoom 3s infinite alternate ease-in-out;
      color: #fff;
      transition: transform 0.3s;
    }

    @keyframes breatheZoom {
      0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
      100% { transform: scale(1.04); filter: drop-shadow(0 0 30px rgba(255,255,255,0.6)); }
    }

    /* ─── WORD PILL ─── */
    .phonics-phrase {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255,255,255,0.3);
      text-shadow: 0 2px 5px rgba(0,0,0,0.7);
      border-radius: 50px;
      padding: 8px 20px;
    }

    /* ─── FEEDBACK ─── */
    .feedback-box {
      min-height: 42px;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      text-align: center;
      transition: background 0.3s;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      width: 100%;
      box-sizing: border-box;
    }
    .feedback-box.perfect { background: rgba(55, 163, 74, 0.8); color: white; }
    .feedback-box.close { background: rgba(255, 200, 0, 0.8); color: black; }
    .feedback-box.wrong { background: rgba(100, 100, 100, 0.8); color: white; }

    /* ─── BUTTONS ─── */
    .ph-btn {
      width: 100%;
      padding: 14px 24px;
      font-size: 1.2rem;
      font-family: "Fugaz One", sans-serif;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-sizing: border-box;
    }
    .ph-btn:hover:not(:disabled) { transform: translateY(-3px) scale(1.03); }
    .ph-btn:active:not(:disabled) { transform: translateY(0) scale(0.97); }
    .ph-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .ph-btn.btn-listen {
      background: linear-gradient(135deg, #6a5acd, #00c9ff);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 6px 20px rgba(106, 90, 205, 0.5);
    }
    .ph-btn.btn-listen:hover:not(:disabled) {
      box-shadow: 0 10px 30px rgba(0, 150, 255, 0.6);
    }

    .ph-btn.btn-speak {
      background: linear-gradient(135deg, #ff6b6b, #ff3b3b);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 6px 20px rgba(255, 60, 60, 0.5);
    }
    .ph-btn.btn-speak:hover:not(:disabled) {
      box-shadow: 0 10px 30px rgba(255, 0, 0, 0.6);
    }
    .ph-btn.btn-speak.listening {
      animation: pulse-ring 1s infinite;
      background: linear-gradient(135deg, #e8445a, #c0392b);
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(232, 68, 90, 0.7); }
      70% { box-shadow: 0 0 0 14px rgba(232, 68, 90, 0); }
      100% { box-shadow: 0 0 0 0 rgba(232, 68, 90, 0); }
    }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-top: 5px;
    }
    .bottom-nav button {
      background: linear-gradient(135deg, rgba(106,90,205,0.5), rgba(0,201,255,0.3));
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .bottom-nav button:hover {
      background: linear-gradient(135deg, rgba(106,90,205,0.7), rgba(0,201,255,0.5));
      transform: translateY(-2px);
    }

    /* ─── PROGRESS BAR ─── */
    .progress-bar-container {
      width: 100%;
      max-width: 400px;
      margin: 5px auto;
      text-align: center;
    }
    .progress-text {
      color: #fff;
      font-size: 1rem;
      font-family: sans-serif;
      font-weight: bold;
      margin-bottom: 5px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      display: flex;
      justify-content: space-between;
    }
    .progress-bg {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      height: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .progress-fill {
      background: linear-gradient(90deg, #ffb347, #ffcc33);
      height: 100%;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 20px;
    }
    
    /* ─── Confetti overlay ─── */
    #confetti-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: visible;
      display: none;
    }

    #confetti-overlay.show {
      display: block !important;
    }

    /* ─── Shake animation for wrong answers ─── */
    @keyframes shakeCard {
      0%, 100% { transform: translateX(0); }
      10%, 50%, 90% { transform: translateX(-8px); }
      30%, 70% { transform: translateX(8px); }
    }
    .shake {
      animation: shakeCard 0.5s ease-in-out !important;
    }

    /* ─── Green celebration glow ─── */
    @keyframes celebrateGlow {
      0%   { box-shadow: inset 0 0 0 0 rgba(76, 175, 80, 0); }
      50%  { box-shadow: inset 0 0 80px 10px rgba(76, 175, 80, 0.5); }
      100% { box-shadow: inset 0 0 0 0 rgba(76, 175, 80, 0); }
    }
    .celebrate {
      animation: celebrateGlow 1s ease-out;
    }

    /* ─── Red Error Flash ─── */
    #error-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 0, 0, 0.6);
      pointer-events: none;
      z-index: 9998;
      opacity: 0;
    }
    #error-overlay.flash {
      animation: aggressiveBlink 0.8s ease-in-out;
    }
    @keyframes aggressiveBlink {
      0%   { opacity: 1; background: rgba(255, 0, 0, 0.8); }
      20%  { opacity: 0; }
      40%  { opacity: 1; background: rgba(255, 0, 0, 0.8); }
      60%  { opacity: 0; }
      80%  { opacity: 1; background: rgba(255, 0, 0, 0.8); }
      100% { opacity: 0; }
    }

    /* ─── Firecracker Explosion ─── */
    .firecracker-emoji {
      position: absolute;
      font-size: 2.5rem;
      pointer-events: none;
      animation: explodeOut 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      z-index: 9999;
    }

    @keyframes explodeOut {
      0% {
        transform: translate(0, 0) scale(0.1);
        opacity: 1;
      }
      80% { opacity: 1; }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(1.5);
        opacity: 0;
      }
    }

    /* ─── Red glow error overlay ─── */
    #error-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      background: rgba(220, 30, 30, 0.0);
      transition: background 0.18s ease;
    }

    #error-overlay.flash {
      background: rgba(220, 30, 30, 0.38);
    }

    /* ─── GRAND CELEBRATION overlay ─── */
    #grand-win {
      display: none !important;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: linear-gradient(135deg, #0e0626 0%, #2d1b69 50%, #0e0626 100%);
      background-size: 300% 300%;
      animation: grad-shift 3s ease infinite;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      overflow: visible;
    }

    #grand-win.show {
      display: flex;
    }

    @keyframes grad-shift {

      0%,
      100% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }
    }

    .gw-star {
      position: absolute;
      font-size: 1.5rem;
      animation: gw-float linear infinite;
      opacity: 0;
      pointer-events: none;
    }

    @keyframes gw-float {
      0% {
        transform: translateY(110vh) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh) rotate(360deg);
        opacity: 0;
      }
    }

    #gw-trophy {
      font-size: 5.5rem;
      animation: gw-trophy-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, gw-trophy-float 2.2s ease-in-out 0.7s infinite;
      line-height: 1;
      filter: drop-shadow(0 0 30px gold);
    }

    @keyframes gw-trophy-pop {
      0% {
        transform: scale(0) rotate(-15deg);
        opacity: 0;
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes gw-trophy-float {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-14px) scale(1.06);
      }
    }

    #gw-title {
      font-family: "Fugaz One", sans-serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gw-shimmer 2s linear infinite, gw-pop 0.6s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      margin: 18px 0 8px;
      letter-spacing: 2px;
    }

    @keyframes gw-shimmer {
      0% {
        background-position: 0%
      }

      100% {
        background-position: 200%
      }
    }

    @keyframes gw-pop {
      0% {
        transform: scale(0.4);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    #gw-sub {
      font-family: "Fugaz One", sans-serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: #e9d5ff;
      margin: 0 0 6px;
      animation: gw-pop 0.6s 0.7s both;
    }

    #gw-unlock {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.55), rgba(75, 42, 173, 0.55));
      border: 2px solid rgba(167, 139, 250, 0.7);
      border-radius: 50px;
      padding: 12px 28px;
      font-family: sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      color: #f3e8ff;
      font-weight: 700;
      margin: 14px auto;
      animation: gw-pop 0.6s 0.9s both;
      box-shadow: 0 0 30px rgba(167, 139, 250, 0.45);
    }

    .gw-ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid rgba(255, 215, 0, 0.35);
      animation: gw-ring-expand 2.4s ease-out infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    @keyframes gw-ring-expand {
      0% {
        width: 60px;
        height: 60px;
        opacity: 1;
      }

      100% {
        width: 600px;
        height: 600px;
        opacity: 0;
      }
    }

    #gw-btn {
      margin-top: 24px;
      padding: 16px 44px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      border-radius: 50px;
      font-family: "Fugaz One", sans-serif;
      font-size: 1.15rem;
      color: #1a0a00;
      cursor: pointer;
      box-shadow: 0 6px 28px rgba(255, 200, 0, 0.55);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: gw-pop 0.6s 1.1s both;
    }

    #gw-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 10px 36px rgba(255, 200, 0, 0.75);
    }
  
    @keyframes glowScreen {
      0% { box-shadow: inset 0 0 0px 0px rgba(55, 163, 74, 0); }
      50% { box-shadow: inset 0 0 150px 20px rgba(55, 163, 74, 0.6); }
      100% { box-shadow: inset 0 0 0px 0px rgba(55, 163, 74, 0); }
    }

    </style>
</head>

  <!-- ════════════════════ SWAR WRAPPER ════════════════════ -->
  <div class="phonics-wrapper">

      <div onclick="window.location.href='hindi.html'" style="cursor:pointer; color: #ffcc00; font-family: 'Fugaz One', sans-serif; font-size: 1.3rem; text-decoration: none; display: flex; align-items: center; gap: 8px;">← Back</div>
      <div style="color: #ff6b6b; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-size: 1.2rem;">🔥 Streak x<span id="streakCounter">0</span></div>

    <!-- PROGRESS UI -->
    <div class="progress-bar-container">
       <div class="progress-text"><span>Lesson Progress:</span><span id="progressText">0/10</span></div>
       <div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    const TOTAL = swarData.length;
    let currentIdx = 0;
    let score = parseInt(localStorage.getItem('bb_hindi_vyanjan_score') || '0', 10);
    let audioPlayed = false;
    let streak = parseInt(localStorage.getItem('bb_hindi_streak') || '0', 10);
    let recognitionActive = false;

    /* ── DOM Elements ── */
    const track = document.getElementById('carouselTrack');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const speakBtn = document.getElementById('speakBtn');
    const feedbackBox = document.getElementById('feedbackBox');
    
    /* ── Build Carousel ── */
    function buildCarousel() {
      track.innerHTML = '';
      swarData.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'carousel-card';
        card.id = `card-${i}`;
        // Mini Scene logic
        // Generate a procedural gradient based on the index to make every letter unique
          const colors = [
              "linear-gradient(135deg, #FF6B35, #FFD700)", // Orange-Gold (अ)
              "linear-gradient(135deg, #FF3366, #FF6B6B)", // Red-Pink (आ)
              "linear-gradient(135deg, #00C9FF, #6A5ACD)", // Blue-Purple (इ)
              "linear-gradient(135deg, #00E676, #76FF03)", // Green (ई)
              "linear-gradient(135deg, #FF9100, #FFEA00)", // Amber (उ)
              "linear-gradient(135deg, #E040FB, #7C4DFF)", // Purple (ऊ)
              "linear-gradient(135deg, #00BCD4, #00E5FF)", // Cyan (ए)
              "linear-gradient(135deg, #FF4081, #F50057)", // Hot Pink (ऐ)
              "linear-gradient(135deg, #FFAB00, #FF6D00)", // Deep Orange (ओ)
              "linear-gradient(135deg, #AA00FF, #D500F9)"  // Violet (औ)
          ];
          const grad = colors[i % colors.length];
          
          card.innerHTML = `
          <div class="big-letter" style="background: ${grad}; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${item.letter}</div>
          <div class="phonics-phrase" style="font-size:1.6rem; padding: 10px 24px; border-radius: 50px;">${item.emoji} ${item.word}</div>
        `;
        // Tapping card interacts
        card.addEventListener('click', () => {
          if (currentIdx === i) {
             card.classList.add('jump');
             speakHindi(item.full, () => {
                audioPlayed = true;
                speakBtn.disabled = false;
                setFeedback(`✅ Now your turn! Say "${item.sound}" 🎤`, '');
             });
             setTimeout(() => card.classList.remove('jump'), 300);
          } else {
             moveTo(i);
          }
        });
        track.appendChild(card);
      });
      updateCarouselView();
    }

    /* ── Carousel Logic ── */
    function moveCarousel(dir) {
      moveTo(currentIdx + dir);
    }

    function moveTo(idx) {
      if (idx < 0) idx = 0;
      if (idx > TOTAL - 1) idx = TOTAL - 1;
      currentIdx = idx;
      
      updateCarouselView();
      resetStateForNewCard();
      
      // Auto-play sound instantly
      const item = swarData[currentIdx];
      const card = document.getElementById(`card-${currentIdx}`);
      card.classList.add('jump');
      setTimeout(() => card.classList.remove('jump'), 300);
      
      speakHindi(item.full, () => {
          if (currentIdx !== idx) return;
          audioPlayed = true;
          speakBtn.disabled = false;
          setFeedback(`🎤 Say the sound: "${item.letter}"`, '');
      });
    }

    function updateCarouselView() {
      const cards = document.querySelectorAll('.carousel-card');
      cards.forEach((card, i) => {
        card.classList.remove('active-card', 'slide-left', 'slide-right');
        if (i === currentIdx) {
          card.classList.add('active-card');
        } else if (i < currentIdx) {
          card.classList.add('slide-left');
        } else {
          card.classList.add('slide-right');
        }
      });
      // Cards are absolutely positioned, NO track transform needed
      track.style.transform = 'none';
    }

    function resetStateForNewCard() {
      audioPlayed = false;
      stopRecognition();
      speakBtn.disabled = true;
      speakBtn.classList.remove('listening');
      speakBtn.textContent = '🎤 बोलें (Tap to Speak)';
      setFeedback('✨ Listen to the Sound!', '');
    }

    function setFeedback(msg, cls) {
      feedbackBox.className = 'feedback-box ' + cls;
      feedbackBox.textContent = msg;
    }

    /* ── Touch Swipe Logic for Mobile ── */
    let touchStartX = 0;
    let touchEndX = 0;
    document.getElementById('carouselContainer').addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    });
    document.getElementById('carouselContainer').addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      if (touchStartX - touchEndX > 50) moveCarousel(1); // Swipe left -> next
      if (touchEndX - touchStartX > 50) moveCarousel(-1); // Swipe right -> prev
    });

    /* ── Keyboard Logic ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') moveCarousel(1);
      if (e.key === 'ArrowLeft') moveCarousel(-1);
    });

    /* ── Speech Recognition ── */
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRec) {
      recognition = new SpeechRec();
      recognition.lang = 'hi-IN';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 5;

      recognition.onresult = (evt) => {
        const item = swarData[currentIdx];
        
        let spoken = '';
        let isFinalBatch = false;

        for (let r = 0; r < evt.results.length; r++) {
          if (evt.results[r].isFinal) isFinalBatch = true;
          for (let a = 0; a < evt.results[r].length; a++) {
            spoken += ' ' + evt.results[r][a].transcript.trim().toLowerCase();
          }
        }
        
        // Instant check (Real-time finding)
        let isMatch = false;
        if (spoken.includes(item.letter) || spoken.includes(item.word.toLowerCase())) {
          isMatch = true;
        } else {
          for (const alt of item.alts) {
            if (spoken.includes(alt.toLowerCase())) isMatch = true;
          }
        }

        if (isMatch) {
          // Absolute zero lag trigger
          try { recognition.abort(); } catch(e) {}
          recognitionActive = false;
          speakBtn.classList.remove('listening');
          speakBtn.textContent = '🎤 बोलें (Tap to Speak)';
          
          score++;
          streak++;
          localStorage.setItem('bb_hindi_vyanjan_score', score);
          localStorage.setItem('bb_hindi_streak', streak);
          updateProgress();
          
          document.querySelector('.phonics-wrapper').classList.add('celebrate');
          setTimeout(() => document.querySelector('.phonics-wrapper').classList.remove('celebrate'), 1200);
          setFeedback('🎉 शाबाश! Perfect! ' + item.emoji, 'perfect');
          showConfetti();
          speakHindi("बहुत अच्छे!");
          
          setTimeout(() => moveCarousel(1), 2500);
          return; // Skip checking rest of batch
        }

        // If they finished a full sentence and STILL no match
        if (isFinalBatch) {
           recognitionActive = false;
           speakBtn.classList.remove('listening');
           speakBtn.textContent = '🎤 बोलें (Tap to Speak)';
           
           streak = 0;
           localStorage.setItem('bb_hindi_streak', streak);
           updateProgress();
           
           if (spoken.trim().length > 0) {
              shakeCard();
              setFeedback('😊 Almost! Try once more!', 'close');
           } else {
              shakeCard();
              showErrorFlash();
              setFeedback('🔁 Try again! Listen first 🔊', 'wrong');
           }
        }
      };

      recognition.onerror = (evt) => {
        // If it's no-speech but we are continuous, sometimes Chrome still throws it. We can ignore it or just reset.
        if (evt.error === 'no-speech') {
           // Do not turn off recognitionActive for no-speech if we want them to keep trying, 
           // but Chrome stops the recognition anyway on error.
        } else {
           recognitionActive = false;
           speakBtn.classList.remove('listening');
           speakBtn.textContent = '🎤 बोलें (Tap to Speak)';
        }
        
        console.error("Speech Rec Error: ", evt.error);
        if (evt.error === 'not-allowed' || evt.error === 'service-not-allowed' || evt.error === 'audio-capture') {
          // It's a real block
          alert("Microphone issue detected! If you are running this from a local file (file:///) in Chrome, microphone capture may fail or be continuously blocked for security.\n\nTo fix this:\n1. Try using Edge or Firefox.\n2. Or, run a local web server (e.g., 'python -m http.server' or 'npx serve' or Live Server in VSCode).\n3. Check Windows Privacy settings 'Allow desktop apps to access your microphone'.");
          setFeedback('⚠️ Mic blocked or capture failed! Run on local server.', 'wrong');
        } else if (evt.error === 'network') {
          setFeedback('⚠️ Network error! Voice needs internet.', 'wrong');
        } else if (evt.error === 'no-speech') {
          setFeedback('😄 Oops! Microphone didn\'t hear anything. Speak louder?', 'close');
        } else {
          setFeedback('😄 Oops! Microphone didn\'t catch that, try again!', 'close');
        }
      };
      
      recognition.onend = () => {
        recognitionActive = false;
        speakBtn.classList.remove('listening');
        speakBtn.textContent = '🎤 बोलें (Tap to Speak)';
      }
    }

    speakBtn.addEventListener('click', () => {
      if (!audioPlayed) {
        setFeedback('👉 Tap the card to listen first!', 'close');
        const card = document.getElementById(`card-${currentIdx}`);
        card.classList.add('jump');
        setTimeout(() => card.classList.remove('jump'), 300);
        return;
      }
      if (!recognition) return alert('Use Chrome/Edge for Voice!');
      if (recognitionActive) return;

      // Stop any ongoing Text-to-Speech safely
      if (window.speechSynthesis.speaking) {
         window.speechSynthesis.cancel();
      }

      recognitionActive = true;
      speakBtn.classList.add('listening');
      speakBtn.textContent = '🔴 Listening...';
      setFeedback(`🎤 Say the sound: "${swarData[currentIdx].letter}"`, '');
      
      try { 
        recognition.start(); 
      } catch(e){
        // Already started or busy
      }
    });

    function stopRecognition() {
      if (recognition && recognitionActive) {
        try { recognition.abort(); } catch(e) {}
        recognitionActive = false;
      }
    }

    /* ══════════════════════════════════════════
       TTS ENGINE (with voice preloading)
    ══════════════════════════════════════════ */
    let _hindiVoice = null;
    let _voicesReady = false;

    function loadVoices() {
      const voices = window.speechSynthesis.getVoices();
      if (voices.length > 0) {
        // 1. Get all Hindi voices
        const hindiVoices = voices.filter(v => /hi[-_]?IN/i.test(v.lang) || /hi/i.test(v.lang));
        // 2. Prioritize a LOCAL voice so it talks instantly without internet lag
        const localVoice = hindiVoices.find(v => v.localService);
        
        _hindiVoice = localVoice || hindiVoices[0] || voices[0];
        _voicesReady = true;
        console.log('🔊 Fast local voice loaded:', _hindiVoice?.name);
      }
    }

    // Chrome loads voices async - must listen for event
    if (window.speechSynthesis) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    function speakHindi(text, onEnd) {
      if (!window.speechSynthesis) { if(onEnd) onEnd(); return; }
      window.speechSynthesis.cancel();
      
      // Retry voice loading if not ready
      if (!_voicesReady) loadVoices();
      
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'hi-IN';
      u.rate = 0.85; // Slightly slower for kids
      u.pitch = 1.1;
      if (_hindiVoice) u.voice = _hindiVoice;
      if (onEnd) u.onend = onEnd;
      
      // Chrome bug: sometimes speak() silently fails. Force resume.
      window.speechSynthesis.speak(u);
      // Workaround for Chrome pausing after 15s
      const keepAlive = setInterval(() => {
        if (!window.speechSynthesis.speaking) clearInterval(keepAlive);
        else window.speechSynthesis.resume();
      }, 5000);
    }

    function replayAudio() {
       if(swarData[currentIdx]) {
         setFeedback('🔊 Playing...', '');
         speakHindi(swarData[currentIdx].full, () => {
           audioPlayed = true;
           speakBtn.disabled = false;
           setFeedback(`🎤 Say the sound: "${swarData[currentIdx].letter}"`, '');
         });
       }
    }

    /* ══════════════════════════════════════════
       CELEBRATION & ERROR EFFECTS
    ══════════════════════════════════════════ */
    function showConfetti() {
      const overlay = document.getElementById('confetti-overlay');
      overlay.innerHTML = '';
      overlay.classList.add('show');
      
      const emojis = ['🎆', '🎇', '✨', '⭐', '🎈', '🎊'];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;

      for (let i = 0; i < 40; i++) {
        const piece = document.createElement('div');
        piece.className = 'firecracker-emoji';
        piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        
        piece.style.left = cx + 'px';
        piece.style.top = cy + 'px';

        // Calculate a random explosion vector
        const angle = Math.random() * Math.PI * 2;
        const velocity = 200 + Math.random() * 400; 
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity + 100; // slight gravity

        piece.style.setProperty('--tx', `${tx}px`);
        piece.style.setProperty('--ty', `${ty}px`);
        
        // Random rotation spin
        piece.style.transform += ` rotate(${Math.random() * 360}deg)`;

        overlay.appendChild(piece);
      }
      setTimeout(() => {
        overlay.classList.remove('show');
        overlay.innerHTML = '';
      }, 1500);
    }

    function showErrorFlash() {
      const overlay = document.getElementById('error-overlay');
      overlay.classList.add('flash');
      setTimeout(() => overlay.classList.remove('flash'), 800);
    }

    function shakeCard() {
      const card = document.getElementById(`card-${currentIdx}`);
      if (card) {
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 600);
      }
    }

    function updateProgress() {
       document.getElementById('progressText').textContent = score + '/' + TOTAL;
       document.getElementById('progressFill').style.width = (score / TOTAL * 100) + '%';
       document.getElementById('streakCounter').textContent = streak;
    }

    // Init
    updateProgress();
    buildCarousel();
    setTimeout(() => moveTo(0), 500);


    </script>
